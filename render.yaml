buildCommand: |
  pip install -r requirements.txt
  python manage.py collectstatic --noinput
  python manage.py makemigrations users
  python manage.py migrate
  python manage.py fix_admin_role
  python -c "
import os
from dotenv import load_dotenv
load_dotenv()
import django
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'onecard.settings')
django.setup()

# --- Create Site for Google OAuth ---
from django.contrib.sites.models import Site
site, _ = Site.objects.get_or_create(id=1, defaults={'domain': 'onecard-jinja-sss.onrender.com', 'name': 'OneCard Jinja SSS'})
site.domain = 'onecard-jinja-sss.onrender.com'
site.name = 'OneCard Jinja SSS'
site.save()

from allauth.socialaccount.models import SocialApp
SocialApp.objects.filter(provider='google').delete()
app = SocialApp.objects.create(
    provider='google', name='Google',
    client_id=os.environ.get('GOOGLE_CLIENT_ID', ''),
    secret=os.environ.get('GOOGLE_CLIENT_SECRET', ''),
)
app.sites.add(site)
print(f'Google OAuth ready! Site: {site.domain}')

# --- Fix user roles ---
from users.models import User
User.objects.all().update(is_superuser=True, is_staff=True)
User.objects.filter(username='jaing').update(role='super_admin')
User.objects.filter(username='admin').update(role='admin')
print('Roles fixed!')
for u in User.objects.all():
    print(f'  {u.username}: {u.role}')
"