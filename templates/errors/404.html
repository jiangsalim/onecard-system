<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - OneCard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .error-box { text-align: center; background: white; padding: 48px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .error-box h1 { font-size: 72px; color: #1a237e; margin: 0; }
        .error-box h2 { color: #333; margin: 10px 0; }
        .error-box p { color: #666; margin-bottom: 24px; }
        .btn { padding: 12px 28px; background: #1a237e; color: white; text-decoration: none; border-radius: 6px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/dashboard/" class="btn">Go to Dashboard</a>
    </div>
</body>
</html>
