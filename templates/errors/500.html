<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — OneCard</title>
    <style>
        :root {
            --navy: #0A1F3F; --navy-light: #132D52;
            --teal: #00C2BA; --teal-dark: #00A8A0;
            --red: #dc2626; --red-bg: #fef2f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A1F3F 0%, #132D52 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 2l24 14v28L30 58 6 44V16L30 2z' fill='none' stroke='white' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 60px 60px;
            opacity: 0.04; pointer-events: none;
        }

        .error-box {
            text-align: center;
            background: white;
            padding: 52px 44px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 480px; width: 100%;
            position: relative; z-index: 1;
        }

        .logo-icon { width: 52px; height: 52px; margin: 0 auto 20px; }

        .error-code {
            font-size: 80px; font-weight: 800;
            color: var(--red);
            letter-spacing: -3px; line-height: 1;
            margin-bottom: 8px;
        }

        .error-icon {
            width: 56px; height: 56px;
            background: var(--red-bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            color: var(--red);
        }

        .error-box h2 {
            color: var(--navy); font-size: 22px; font-weight: 700;
            letter-spacing: -0.3px; margin-bottom: 10px;
        }

        .error-box p {
            color: #6b7280; font-size: 14px;
            line-height: 1.6; margin-bottom: 28px;
        }

        .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        .btn {
            padding: 13px 24px;
            text-decoration: none; border-radius: 12px;
            font-weight: 600; font-size: 14px;
            display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.15s ease;
        }
        .btn:hover { transform: translateY(-1px); }

        .btn-primary {
            background: var(--navy); color: white;
        }
        .btn-primary:hover {
            background: var(--navy-light);
            box-shadow: 0 4px 12px rgba(10,31,63,0.3);
        }

        .btn-secondary {
            background: white; color: #6b7280;
            border: 1.5px solid #e5e7eb;
        }
        .btn-secondary:hover {
            border-color: var(--navy); color: var(--navy);
        }

        @media (max-width: 480px) {
            .error-box { padding: 36px 24px; }
            .error-code { font-size: 60px; }
            .btn-row { flex-direction: column; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="error-box">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0A1F3F" stroke="#00C2BA" stroke-width="3"/>
            <line x1="35" y1="30" x2="35" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="65" y1="30" x2="65" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="35" y1="50" x2="65" y2="50" stroke="#00C2BA" stroke-width="5" stroke-linecap="round"/>
        </svg>

        <div class="error-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>

        <div class="error-code">500</div>
        <h2>Server Error</h2>
        <p>Something went wrong on our end. Please try again or contact IT support.</p>

        <div class="btn-row">
            <a href="/dashboard/" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Go to Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Go Back
            </a>
        </div>
    </div>

    <script>
        console.log("╔══════════════════════════════════════╗");
        console.log("║        ONECARD SYSTEM               ║");
        console.log("║   Smart Student Management          ║");
        console.log("║   (c) 2026 Herman Software Solutions║");
        console.log("╚══════════════════════════════════════╝");
    </script>
</body>
</html>
