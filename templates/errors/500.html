<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - OneCard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .error-box { text-align: center; background: white; padding: 48px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .error-box h1 { font-size: 72px; color: #c62828; margin: 0; }
        .error-box h2 { color: #333; margin: 10px 0; }
        .error-box p { color: #666; margin-bottom: 24px; }
        .btn { padding: 12px 28px; background: #1a237e; color: white; text-decoration: none; border-radius: 6px; font-weight: 500; margin: 0 6px; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>500</h1>
        <h2>Server Error</h2>
        <p>Something went wrong on our end. Please try again or contact IT support.</p>
        <a href="/dashboard/" class="btn">Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn" style="background:#666;">Go Back</a>
    </div>
</body>
</html>
