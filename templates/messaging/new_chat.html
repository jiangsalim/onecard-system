<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>New Message — OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0A1F3F; --navy-light: #132D52;
            --teal: #00C2BA; --teal-dark: #00A8A0;
            --bg: #f0f2f5; --card-bg: #ffffff;
            --text: #1f2937; --text-muted: #6b7280;
            --border: #e5e7eb; --sidebar-hover: #f0f4ff;
            --blue: #2563eb; --blue-bg: #eff6ff;
        }

        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        .navbar { background: var(--navy); color: white; padding: 0 28px; display: flex; justify-content: space-between; align-items: center; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(10,31,63,0.15); }
        .navbar .brand { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
        .navbar .brand .logo-icon { width: 34px; height: 34px; }
        .navbar .brand span { color: var(--teal); }
        .navbar a { color: white; text-decoration: none; }

        .layout { display: flex; }
        .sidebar { width: 260px; background: var(--card-bg); min-height: calc(100vh - 64px); border-right: 1px solid var(--border); padding: 16px 12px; }
        .sidebar .section-title { padding: 20px 16px 8px; font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.8px; font-weight: 700; }
        .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; border-radius: 10px; margin-bottom: 2px; transition: all 0.15s ease; border-left: 3px solid transparent; }
        .sidebar a:hover { background: var(--sidebar-hover); color: var(--navy); }
        .sidebar a.active { background: var(--sidebar-hover); color: var(--navy); font-weight: 600; border-left-color: var(--teal); }
        .sidebar a .icon { width: 18px; height: 18px; opacity: 0.45; flex-shrink: 0; }
        .sidebar a.active .icon, .sidebar a:hover .icon { opacity: 1; }

        .main-content { flex: 1; padding: 28px 32px; max-width: 600px; }
        .page-title { color: var(--navy); font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.4px; display: flex; align-items: center; gap: 10px; }
        .page-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

        .card { background: var(--card-bg); border-radius: 16px; padding: 28px; border: 1px solid var(--border); }
        .card h2 { color: var(--navy); font-size: 20px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .card .description { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }

        .search-wrap { position: relative; margin-bottom: 16px; }
        .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-muted); }
        .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; font-family: inherit; color: var(--text); background: white; transition: border-color 0.15s ease; }
        .search-wrap input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,194,186,0.1); }
        .search-wrap input::placeholder { color: #cbd5e1; }

        .user-list { display: flex; flex-direction: column; gap: 4px; max-height: 450px; overflow-y: auto; }
        .user-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 12px; text-decoration: none; color: var(--text); cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: inherit; transition: all 0.15s ease; }
        .user-item:hover { background: var(--sidebar-hover); }
        .user-item .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--navy); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; flex-shrink: 0; }
        .user-item .name { font-weight: 600; font-size: 14px; color: var(--navy); }
        .user-item .role-badge { font-size: 11px; color: var(--blue); background: var(--blue-bg); padding: 3px 10px; border-radius: 50px; font-weight: 500; }

        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; min-height: auto; display: flex; flex-wrap: wrap; padding: 8px 4px; border-right: none; border-bottom: 1px solid var(--border); position: static; overflow-x: auto; }
            .sidebar .section-title { display: none; }
            .sidebar a { padding: 8px 12px; font-size: 12px; border-radius: 0; white-space: nowrap; }
            .main-content { padding: 16px 12px; }
            .card { padding: 20px; }
            .navbar { padding: 0 14px; }
            .navbar .brand { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'dashboard' %}">
            <div class="brand">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0A1F3F" stroke="#00C2BA" stroke-width="3"/>
                    <line x1="35" y1="30" x2="35" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
                    <line x1="65" y1="30" x2="65" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
                    <line x1="35" y1="50" x2="65" y2="50" stroke="#00C2BA" stroke-width="5" stroke-linecap="round"/>
                </svg>
                One<span>Card</span>
            </div>
        </a>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="section-title">Messaging</div>
            <a href="{% url 'inbox' %}">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                ← Inbox
            </a>
            <a href="{% url 'start_conversation' %}" class="active">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                New Message
            </a>
        </div>

        <div class="main-content">
            <h1 class="page-title">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                New Message
            </h1>
            <p class="page-subtitle">Select a staff member to start a conversation</p>

            <div class="card">
                <h2>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Select Recipient
                </h2>
                <p class="description">Choose who you'd like to message from the list below.</p>

                <div class="search-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="search" id="searchInput" placeholder="Search by name or role..." oninput="filterUsers()">
                </div>

                <div class="user-list" id="userList">
                    {% for u in users %}
                    <form method="post" style="display:contents;">
                        {% csrf_token %}
                        <input type="hidden" name="user_id" value="{{ u.id }}">
                        <button type="submit" class="user-item">
                            <div class="avatar">{{ u.get_full_name|default:u.username|slice:":1"|upper }}</div>
                            <div>
                                <div class="name">{{ u.get_full_name|default:u.username }}</div>
                                <span class="role-badge">{{ u.get_role_display|default:u.role }}</span>
                            </div>
                        </button>
                    </form>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        function filterUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(q) ? 'flex' : 'none';
            });
        }
    </script>

    <script>
        console.log("╔══════════════════════════════════════╗");
        console.log("║        ONECARD SYSTEM               ║");
        console.log("║   Smart Student Management          ║");
        console.log("║   (c) 2026 Herman Software Solutions║");
        console.log("╚══════════════════════════════════════╝");
    </script>
</body>
</html>
