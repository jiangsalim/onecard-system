<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Sign In — OneCard</title>
    <style>
        :root {
            --navy: #0A1F3F; --teal: #00C2BA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0A1F3F 0%, #132D52 100%);
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Hexagon pattern */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 2l24 14v28L30 58 6 44V16L30 2z' fill='none' stroke='white' stroke-width='0.3'/%3E%3C/svg%3E");
            background-size: 60px 60px;
            opacity: 0.03; pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 44px 36px;
            max-width: 420px; width: 100%;
            text-align: center;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 1;
        }

        /* Logo */
        .logo-icon {
            width: 56px; height: 56px;
            margin: 0 auto 22px;
            filter: drop-shadow(0 4px 12px rgba(0,194,186,0.3));
        }

        /* Lock icon ring */
        .lock-ring {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: rgba(0, 194, 186, 0.1);
            border: 2px solid rgba(0, 194, 186, 0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 22px;
            color: var(--teal);
        }

        .card h2 {
            color: white; font-size: 22px; font-weight: 700;
            letter-spacing: -0.3px; margin-bottom: 6px;
        }

        .card .subtitle {
            color: rgba(255,255,255,0.55);
            font-size: 13px; margin-bottom: 28px; line-height: 1.6;
        }
        .card .subtitle strong { color: var(--teal); font-weight: 600; }

        /* Divider with text */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 22px;
        }
        .divider-line {
            flex: 1; height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider-text {
            font-size: 11px; color: rgba(255,255,255,0.35);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Google Button */
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px;
            background: white;
            color: #1f2937;
            border: none; border-radius: 14px;
            text-decoration: none; font-weight: 600; font-size: 15px;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .btn-google:active { transform: translateY(0); }
        .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

        /* Back link */
        .back-link {
            display: inline-flex; align-items: center; gap: 4px;
            margin-top: 18px; color: rgba(255,255,255,0.45);
            text-decoration: none; font-size: 13px; font-weight: 500;
            transition: color 0.15s ease;
        }
        .back-link:hover { color: var(--teal); }

        /* Info row */
        .info-row {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-top: 22px;
            padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 11px; color: rgba(255,255,255,0.3);
        }
        .info-row .dot {
            width: 3px; height: 3px;
            background: var(--teal);
            border-radius: 50%;
        }

        @media (max-width: 480px) {
            .card { padding: 34px 22px; border-radius: 22px; }
            .card h2 { font-size: 19px; }
            .btn-google { padding: 13px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Hexagon Logo -->
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0A1F3F" stroke="#00C2BA" stroke-width="3"/>
            <line x1="35" y1="30" x2="35" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="65" y1="30" x2="65" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="35" y1="50" x2="65" y2="50" stroke="#00C2BA" stroke-width="5" stroke-linecap="round"/>
        </svg>

        <div class="lock-ring">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>

        <h2>Sign In with Google</h2>
        <p class="subtitle">You are signing into <strong>OneCard</strong><br>using your Google account.</p>

        <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-text">Continue with</span>
            <span class="divider-line"></span>
        </div>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-google">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>
        </form>

        <a href="{% url 'login' %}" class="back-link">← Back to Login</a>

        <div class="info-row">
            <span>OneCard</span>
            <span class="dot"></span>
            <span>Jinja SSS</span>
            <span class="dot"></span>
            <span>Herman Software Solutions</span>
        </div>
    </div>
</body>
</html>
