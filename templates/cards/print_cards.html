<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Cards - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #1a237e; color: white; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .navbar .brand { font-size: 18px; font-weight: 600; }
        .navbar a { color: white; text-decoration: none; }
        .navbar .user-info { display: flex; align-items: center; gap: 16px; font-size: 14px; }
        .navbar .role-badge { background: #ff9800; color: #000; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .layout { display: flex; }
        .sidebar { width: 240px; background: white; min-height: calc(100vh - 60px); border-right: 1px solid #e0e0e0; padding-top: 10px; }
        .sidebar a { display: block; padding: 12px 24px; color: #333; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; }
        .sidebar a:hover { background: #f5f5ff; color: #1a237e; border-left-color: #1a237e; }
        .sidebar .section-title { padding: 20px 24px 8px; font-size: 11px; text-transform: uppercase; color: #999; letter-spacing: 1.5px; font-weight: 600; }
        .main-content { flex: 1; padding: 24px 32px; }
        .card { background: white; border-radius: 8px; padding: 24px; border: 1px solid #e8e8e8; max-width: 500px; }
        .card h2 { color: #1a237e; margin-bottom: 16px; }
        .checkbox-group { margin-bottom: 12px; }
        .checkbox-group label { display: block; padding: 8px; font-size: 14px; cursor: pointer; }
        .btn { padding: 10px 24px; background: #1a237e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand"><a href="{% url 'dashboard' %}" style="color:white;">OneCard System</a></div>
        <div class="user-info">
            <span class="role-badge">{{ user.get_role_display }}</span>
            <span>{{ user.get_full_name|default:user.username }}</span>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <div class="section-title">Cards</div>
            <a href="{% url 'template_list' %}">Card Designs</a>
            <a href="{% url 'assign_templates' %}">Assign to Classes</a>
            <a href="{% url 'print_cards' %}" style="background:#f5f5ff; color:#1a237e; border-left-color:#1a237e;">Print Cards</a>
        </div>
        <div class="main-content">
            <div class="card">
                <h2>Print Student Cards</h2>
                <form method="post">
                    {% csrf_token %}
                    <p style="color:#666; margin-bottom:12px;">Select classes to print:</p>
                    {% for class_name in classes %}
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" name="classes" value="{{ class_name }}">
                            {{ class_name }}
                        </label>
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn">Preview Cards</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
