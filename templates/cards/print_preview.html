<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Preview - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e0e0e0; padding: 20px; }
        .card-preview {
            width: 320px; background: white; border: 2px solid #1a237e; border-radius: 8px;
            padding: 16px; margin: 10px; display: inline-block; vertical-align: top;
        }
        .card-preview .header { text-align: center; font-weight: bold; font-size: 12px; margin-bottom: 8px; }
        .card-preview .qr { text-align: center; margin: 8px 0; }
        .card-preview .qr img { width: 100px; height: 100px; }
        .card-preview .info { font-size: 11px; line-height: 1.6; }
        .btn-print { padding: 10px 30px; background: #1a237e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin: 20px; }
        @media print {
            .btn-print { display: none; }
            body { background: white; padding: 0; }
            .card-preview { page-break-inside: avoid; }
        }
        /* Mobile Responsive */
@media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { 
        width: 100%; min-height: auto; 
        display: flex; flex-wrap: wrap; gap: 0;
        padding: 5px 0; border-right: none; 
        border-bottom: 1px solid #e0e0e0;
    }
    .sidebar .section-title { display: none; }
    .sidebar a { 
        padding: 8px 12px; font-size: 12px; 
        border-left: none; border-bottom: 2px solid transparent;
    }
    .sidebar a:hover { border-bottom-color: #1a237e; border-left: none; }
    .main-content { margin-left: 0; padding: 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 16px 10px; }
    .stat-card .stat-value { font-size: 22px; }
    .stat-card .stat-label { font-size: 11px; }
    .grid-2 { grid-template-columns: 1fr; }
    .action-grid { grid-template-columns: 1fr; }
    .card { padding: 16px; }
    .card h2 { font-size: 16px; }
    table { font-size: 11px; }
    th, td { padding: 6px 8px; }
    .btn { padding: 8px 14px; font-size: 12px; }
    .navbar { padding: 0 10px; }
    .navbar .brand { font-size: 15px; }
    .navbar .user-info { gap: 8px; font-size: 11px; }
    .navbar .role-badge { padding: 2px 8px; font-size: 9px; }
    .quick-links { flex-direction: column; }
    .quick-links .btn { width: 100%; text-align: center; }
    .filter-row { flex-direction: column; }
    .filter-row select, .filter-row input { width: 100%; }
}
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <button class="btn-print" onclick="window.print()">Print All Cards</button>
    
    {% for student in students %}
    <div class="card-preview">
        <div class="header">ONECARD SYSTEM</div>
        <div style="text-align:center; font-size:11px; color:#888;">Student ID Card</div>
        <div class="qr">
            {% if student.qr_code %}
            <img src="{{ student.qr_code.url }}" alt="QR">
            {% endif %}
        </div>
        <div class="info">
            <strong>ID:</strong> {{ student.id }}<br>
            <strong>Admission:</strong> {{ student.admission_number }}<br>
            <strong>Payment Code:</strong> {{ student.payment_code }}<br>
            <strong>Status:</strong> {{ student.get_status_display }}
        </div>
    </div>
    {% endfor %}
</body>
</html>
