<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Change Password — OneCard</title>
    <style>
        :root {
            --navy: #0A1F3F; --navy-light: #132D52;
            --teal: #00C2BA; --teal-dark: #00A8A0;
            --bg: #f0f2f5; --card-bg: #ffffff;
            --text: #1f2937; --text-muted: #6b7280;
            --green: #059669; --green-bg: #ecfdf5;
            --blue-bg: #eff6ff; --blue: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A1F3F 0%, #132D52 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Hexagon pattern overlay */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 2l24 14v28L30 58 6 44V16L30 2z' fill='none' stroke='white' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 60px 60px;
            opacity: 0.04;
            pointer-events: none;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 52px; height: 52px;
            margin: 0 auto 20px;
        }

        .card h2 {
            color: var(--navy);
            font-size: 24px; font-weight: 700;
            letter-spacing: -0.3px; margin-bottom: 6px;
        }
        .card .subtitle {
            color: var(--text-muted);
            font-size: 14px; margin-bottom: 24px;
        }

        .email-highlight {
            background: var(--blue-bg);
            border: 1px solid rgba(37,99,235,0.15);
            padding: 14px; border-radius: 12px;
            font-weight: 600; color: var(--blue);
            font-size: 15px; margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center;
            gap: 8px;
        }

        .alert {
            padding: 12px 16px; border-radius: 12px;
            margin-bottom: 16px; font-size: 13px; font-weight: 500;
        }
        .alert-success { background: var(--green-bg); color: var(--green); }

        .btn {
            padding: 14px 32px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            width: 100%; font-family: inherit;
            transition: all 0.15s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary {
            background: var(--navy); color: white;
        }
        .btn-primary:hover {
            background: var(--navy-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10,31,63,0.3);
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 4px;
            margin-top: 16px; color: var(--text-muted);
            text-decoration: none; font-size: 13px; font-weight: 500;
            transition: color 0.15s ease;
        }
        .back-link:hover { color: var(--navy); }

        @media (max-width: 480px) {
            .card { padding: 28px 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0A1F3F" stroke="#00C2BA" stroke-width="3"/>
            <line x1="35" y1="30" x2="35" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="65" y1="30" x2="65" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="35" y1="50" x2="65" y2="50" stroke="#00C2BA" stroke-width="5" stroke-linecap="round"/>
        </svg>

        <h2>Change Password</h2>
        <p class="subtitle">A verification code will be sent to:</p>

        <div class="email-highlight">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            {{ user_email }}
        </div>

        {% if messages %}
        {% for m in messages %}<div class="alert alert-success">{{ m }}</div>{% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Send Verification Code
            </button>
        </form>

        <a href="{% url 'dashboard' %}" class="back-link">← Cancel</a>
    </div>

    <script>
        console.log("╔══════════════════════════════════════╗");
        console.log("║        ONECARD SYSTEM               ║");
        console.log("║   Smart Student Management          ║");
        console.log("║   (c) 2026 Herman Software Solutions║");
        console.log("╚══════════════════════════════════════╝");
    </script>
</body>
</html>
