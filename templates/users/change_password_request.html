<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Change Password - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 440px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        .card h2 { color: #1a237e; margin-bottom: 8px; }
        .card p { color: #666; margin-bottom: 20px; font-size: 14px; }
        .card .email-highlight { background: #e8eaf6; padding: 12px; border-radius: 8px; font-weight: 600; color: #1a237e; margin-bottom: 20px; }
        .btn { padding: 14px 32px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-primary { background: #1a237e; color: white; }
        .back-link { display: block; margin-top: 12px; color: #888; text-decoration: none; font-size: 13px; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Change Password</h2>
        <p>A verification code will be sent to:</p>
        <div class="email-highlight">{{ user_email }}</div>
        
        {% if messages %}
        {% for m in messages %}<div class="alert alert-success">{{ m }}</div>{% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary">Send Verification Code</button>
        </form>
        <a href="{% url 'dashboard' %}" class="back-link">ã Cancel</a>
    </div>
