<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Verify Code — OneCard</title>
    <style>
        :root {
            --navy: #0A1F3F; --navy-light: #132D52;
            --teal: #00C2BA; --teal-dark: #00A8A0;
            --bg: #f0f2f5; --card-bg: #ffffff;
            --text: #1f2937; --text-muted: #6b7280;
            --red: #dc2626; --red-bg: #fef2f2;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A1F3F 0%, #132D52 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 2l24 14v28L30 58 6 44V16L30 2z' fill='none' stroke='white' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 60px 60px;
            opacity: 0.04; pointer-events: none;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 440px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative; z-index: 1;
        }

        .logo-icon { width: 52px; height: 52px; margin: 0 auto 20px; }

        .card h2 {
            color: var(--navy); font-size: 24px; font-weight: 700;
            letter-spacing: -0.3px; margin-bottom: 6px;
        }
        .card .subtitle {
            color: var(--text-muted); font-size: 14px; margin-bottom: 24px;
        }

        .alert {
            padding: 12px 16px; border-radius: 12px;
            margin-bottom: 16px; font-size: 13px; font-weight: 500;
        }
        .alert-error { background: var(--red-bg); color: var(--red); }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-weight: 600; font-size: 13px;
            margin-bottom: 6px; color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px; font-family: inherit;
            color: var(--text); background: white;
            transition: border-color 0.15s ease;
        }
        .form-group input:focus {
            outline: none; border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(0,194,186,0.1);
        }
        .form-group input.code-input {
            text-align: center; letter-spacing: 6px;
            font-size: 22px; font-weight: 700;
            font-family: 'Courier New', monospace;
        }
        .form-group input::placeholder { color: #cbd5e1; font-weight: 400; letter-spacing: 0; font-size: 15px; }

        .btn {
            padding: 14px 32px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            width: 100%; font-family: inherit;
            transition: all 0.15s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary {
            background: var(--navy); color: white;
        }
        .btn-primary:hover {
            background: var(--navy-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10,31,63,0.3);
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 4px;
            margin-top: 16px; color: var(--text-muted);
            text-decoration: none; font-size: 13px; font-weight: 500;
            transition: color 0.15s ease;
        }
        .back-link:hover { color: var(--navy); }

        @media (max-width: 480px) {
            .card { padding: 28px 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0A1F3F" stroke="#00C2BA" stroke-width="3"/>
            <line x1="35" y1="30" x2="35" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="65" y1="30" x2="65" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="35" y1="50" x2="65" y2="50" stroke="#00C2BA" stroke-width="5" stroke-linecap="round"/>
        </svg>

        <h2>Verify & Change Password</h2>
        <p class="subtitle">Enter the 6-digit code sent to your email.</p>

        {% if messages %}
        {% for m in messages %}<div class="alert alert-{{ m.tags }}">{{ m }}</div>{% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" name="code" class="code-input" placeholder="000000" maxlength="6" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Min 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Change Password
            </button>
        </form>
        <a href="{% url 'change_password' %}" class="back-link">← Resend code</a>
    </div>

    <script>
        console.log("╔══════════════════════════════════════╗");
        console.log("║        ONECARD SYSTEM               ║");
        console.log("║   Smart Student Management          ║");
        console.log("║   (c) 2026 Herman Software Solutions║");
        console.log("╚══════════════════════════════════════╝");
    </script>
</body>
</html>
