<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Management - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #1a237e; color: white; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .navbar .brand { font-size: 18px; font-weight: 600; }
        .navbar a { color: white; text-decoration: none; }
        .layout { display: flex; }
        .sidebar { width: 240px; background: white; min-height: calc(100vh - 60px); border-right: 1px solid #e0e0e0; padding-top: 10px; }
        .sidebar a { display: block; padding: 12px 24px; color: #333; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; }
        .sidebar a:hover { background: #f5f5ff; color: #1a237e; border-left-color: #1a237e; }
        .sidebar .section-title { padding: 20px 24px 8px; font-size: 11px; text-transform: uppercase; color: #999; letter-spacing: 1.5px; font-weight: 600; }
        .main-content { flex: 1; padding: 24px 32px; }
        .card { background: white; border-radius: 8px; padding: 24px; border: 1px solid #e8e8e8; max-width: 700px; }
        .card h2 { color: #1a237e; margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #d0d0d0; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
        th { background: #f5f5f5; }
        .btn { padding: 10px 24px; background: #1a237e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .alert { padding: 12px 20px; border-radius: 6px; margin-bottom: 16px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand"><a href="{% url 'dashboard' %}" style="color:white;">OneCard System</a></div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <div class="section-title">Fees</div>
            <a href="{% url 'fee_management' %}" style="background:#f5f5ff; color:#1a237e; border-left-color:#1a237e;">Manage Fees</a>
            <a href="{% url 'fee_report' %}">Fee Report</a>
        </div>
        <div class="main-content">
            {% if messages %}
            {% for m in messages %}<div class="alert alert-success">{{ m }}</div>{% endfor %}
            {% endif %}
            <div class="card">
                <h2>Set Fees Per Class</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="form-row">
                        <div class="form-group">
                            <label>Term</label>
                            <select name="term">
                                <option>Term 1</option><option selected>Term 2</option><option>Term 3</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Academic Year</label>
                            <input type="text" name="academic_year" value="2026">
                        </div>
                    </div>
                    <table>
                        <thead><tr><th>Class</th><th>Total Fees (UGX)</th></tr></thead>
                        <tbody>
                            {% for c in classes %}
                            <tr>
                                <td><strong>{{ c }}</strong></td>
                                <td><input type="number" name="fees_{{ c }}" placeholder="e.g. 800000" style="width:100%; padding:8px;"></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <br>
                    <button type="submit" class="btn">Save Fees</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
