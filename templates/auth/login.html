<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8eaf6; }
        .login-container {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: white; border-radius: 12px; padding: 44px 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12); width: 400px;
        }
        .login-box .logo {
            text-align: center; margin-bottom: 24px;
        }
        .login-box .logo-icon {
            display: inline-block; width: 56px; height: 56px;
            background: #1a237e; border-radius: 12px; text-align: center;
            line-height: 56px; color: white; font-size: 24px; font-weight: bold;
        }
        .login-box h1 { text-align: center; color: #1a237e; font-size: 22px; margin-bottom: 4px; }
        .login-box .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #333; font-weight: 600; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid #d0d0d0;
            border-radius: 6px; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #1a237e; }
        .btn-primary {
            width: 100%; padding: 14px; background: #1a237e; color: white;
            border: none; border-radius: 6px; font-size: 15px; font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover { background: #283593; }
        .alert {
            padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px;
        }
        .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #f44336; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
        .alert-info { background: #e3f2fd; color: #1565c0; border-left: 4px solid #2196f3; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">OC</div>
            </div>
            <h1>OneCard System</h1>
            <p class="subtitle">School Management System</p>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
