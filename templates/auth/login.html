<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <title>Login - JINJA SSS OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: url('/media/school.jpg') center/cover no-repeat fixed;
            position: relative;
        }
        /* Dark overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }
        
        /* Glass card */
        .login-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .badge-wrapper { margin-bottom: 20px; display: inline-block; }
        .badge-wrapper img {
            width: 90px; height: 90px; border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            cursor: pointer; transition: transform 0.2s;
        }
        .badge-wrapper img:hover { transform: scale(1.05); }
        
        .school-name {
            font-size: 15px; font-weight: 700; color: #fff;
            letter-spacing: 0.5px; text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .school-subtitle { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
        .system-name {
            font-size: 22px; font-weight: 700; color: #fff;
            margin-bottom: 6px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .divider {
            width: 60px; height: 3px; background: #ff9800;
            margin: 0 auto 24px; border-radius: 2px;
        }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label {
            display: block; margin-bottom: 6px; font-weight: 600;
            font-size: 13px; color: rgba(255,255,255,0.9);
        }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px; font-size: 15px; color: white;
            outline: none; transition: 0.2s;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.4); }
        .form-group input:focus {
            border-color: #ff9800;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.15);
        }
        
        .btn-signin {
            width: 100%; padding: 15px;
            background: #1a237e; color: white;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background 0.2s; letter-spacing: 0.3px;
            margin-top: 8px;
        }
        .btn-signin:hover { background: #283593; }
        
        .alert {
            padding: 12px 16px; border-radius: 10px; margin-bottom: 16px;
            font-size: 13px; text-align: left;
        }
        .alert-error {
            background: rgba(198, 40, 40, 0.2);
            color: #ff8a80; border: 1px solid rgba(198, 40, 40, 0.3);
        }
        .alert-success {
            background: rgba(46, 125, 50, 0.2);
            color: #a5d6a7; border: 1px solid rgba(46, 125, 50, 0.3);
        }
        .alert-info {
            background: rgba(21, 101, 192, 0.2);
            color: #90caf9; border: 1px solid rgba(21, 101, 192, 0.3);
        }
        
        .footer-text {
            margin-top: 24px; font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        .footer-text a {
            color: #ffcc80; text-decoration: none; font-weight: 600;
            transition: color 0.2s;
        }
        .footer-text a:hover { color: #ff9800; text-decoration: underline; }
        
        /* Shake animation */
        @keyframes shake {
            0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}
        }
        .shake { animation: shake 0.6s ease-in-out; }
        
        /* Badge overlay */
        .badge-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9); z-index: 9999;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .badge-overlay.show { display: flex; }
        .badge-overlay img {
            max-width: 90vw; max-height: 90vh; border-radius: 20px;
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .badge-overlay .close-hint {
            position: absolute; bottom: 30px; color: rgba(255,255,255,0.7); font-size: 14px;
        }
        
        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; width: 100%; max-width: 360px; }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginBox">
        <!-- Badge -->
        <div class="badge-wrapper" onclick="expandBadge()" title="Click to view full size">
            <img src="/media/badge.jpg" alt="JINJA SSS Badge" id="badgeImg">
        </div>

        <!-- School Name -->
        <div class="school-name">Jinja Senior Secondary School</div>
        <div class="school-subtitle">P.O Box 255, Jinja | Tel: 0772404055</div>

        <!-- System Name -->
        <div class="system-name">OneCard System</div>
        <div class="divider"></div>

        <!-- Messages -->
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="post" id="loginForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <!-- Herman Software Footer -->
        <div class="footer-text">
            Developed & Managed by<br>
            <a href="https://herman-software-website.vercel.app/" target="_blank">
                Herman Software Solutions
            </a>
            <br>
            <span style="font-size:10px; opacity:0.6;">herman-software-website.vercel.app</span>
        </div>
    </div>

    <!-- Badge Overlay -->
    <div class="badge-overlay" id="badgeOverlay" onclick="closeBadge()">
        <img src="/media/badge.jpg" alt="JINJA SSS Badge">
        <div class="close-hint">Click anywhere to close</div>
    </div>

    <script>
        function expandBadge() { document.getElementById('badgeOverlay').classList.add('show'); }
        function closeBadge() { document.getElementById('badgeOverlay').classList.remove('show'); }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeBadge(); });
        
        {% if messages %}
        {% for message in messages %}
        {% if message.tags == 'error' %}
        document.getElementById('loginBox').classList.add('shake');
        setTimeout(function(){ document.getElementById('loginBox').classList.remove('shake'); }, 600);
        {% endif %}
        {% endfor %}
        {% endif %}
    </script>
</body>
</html>
