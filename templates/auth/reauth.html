<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Verify Identity — OneCard</title>
    <style>
        :root {
            --navy: #0A1F3F; --navy-light: #132D52;
            --teal: #00C2BA; --teal-dark: #00A8A0;
            --red: #dc2626; --red-bg: #fef2f2;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A1F3F 0%, #132D52 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 2l24 14v28L30 58 6 44V16L30 2z' fill='none' stroke='white' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 60px 60px;
            opacity: 0.04; pointer-events: none;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 44px 38px;
            max-width: 440px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            position: relative; z-index: 1;
        }

        .logo-icon { width: 52px; height: 52px; margin: 0 auto 18px; }

        .icon-wrap {
            width: 60px; height: 60px; border-radius: 16px;
            background: rgba(0,194,186,0.1);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px; color: var(--teal);
        }

        .card h2 {
            color: var(--navy); font-size: 22px; font-weight: 700;
            letter-spacing: -0.3px; margin-bottom: 8px;
        }

        .card .subtitle {
            color: #6b7280; font-size: 14px;
            margin-bottom: 20px; line-height: 1.5;
        }
        .card .action-name {
            font-weight: 600; color: var(--teal);
        }

        .card input {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px; font-size: 14px;
            margin-bottom: 16px; outline: none;
            font-family: inherit; color: var(--navy);
            transition: border-color 0.15s ease;
        }
        .card input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(0,194,186,0.1);
        }
        .card input::placeholder { color: #cbd5e1; }

        .card button {
            width: 100%; padding: 14px;
            background: var(--navy); color: white;
            border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: inherit;
            transition: all 0.15s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .card button:hover {
            background: var(--navy-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10,31,63,0.3);
        }

        .card .cancel {
            display: inline-flex; align-items: center; gap: 4px;
            margin-top: 14px; color: #6b7280;
            text-decoration: none; font-size: 13px; font-weight: 500;
            transition: color 0.15s ease;
        }
        .card .cancel:hover { color: var(--navy); }

        .alert-error {
            background: var(--red-bg); color: var(--red);
            padding: 12px 14px; border-radius: 10px;
            margin-bottom: 16px; font-size: 13px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-error svg { width: 16px; height: 16px; flex-shrink: 0; }

        @media (max-width: 480px) {
            .card { padding: 32px 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0A1F3F" stroke="#00C2BA" stroke-width="3"/>
            <line x1="35" y1="30" x2="35" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="65" y1="30" x2="65" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <line x1="35" y1="50" x2="65" y2="50" stroke="#00C2BA" stroke-width="5" stroke-linecap="round"/>
        </svg>

        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/>
            </svg>
        </div>

        <h2>Verify Your Identity</h2>
        <p class="subtitle">You are about to perform: <span class="action-name">{{ action_name }}</span><br>Please enter your password to continue.</p>

        {% if messages %}
        {% for m in messages %}
        <div class="alert-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ m }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="password" name="reauth_password" placeholder="Enter your password" required autofocus>
            <button type="submit">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Verify & Continue
            </button>
            <a href="{% url 'dashboard' %}" class="cancel">← Cancel</a>
        </form>
    </div>

    <script>
        console.log("╔══════════════════════════════════════╗");
        console.log("║        ONECARD SYSTEM               ║");
        console.log("║   Smart Student Management          ║");
        console.log("║   (c) 2026 Herman Software Solutions║");
        console.log("╚══════════════════════════════════════╝");
    </script>
</body>
</html>
