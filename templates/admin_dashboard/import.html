<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Students — OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0A1F3F;
            --navy-light: #132D52;
            --teal: #00C2BA;
            --teal-dark: #00A8A0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --sidebar-hover: #f0f4ff;
            --green: #059669;
            --green-bg: #ecfdf5;
            --orange: #ea580c;
            --orange-bg: #fff7ed;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --blue: #2563eb;
            --blue-bg: #eff6ff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Navbar ─────────────────────── */
        .navbar {
            background: var(--navy);
            color: white;
            padding: 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(10,31,63,0.15);
        }

        .navbar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .navbar .brand .logo-icon { width: 34px; height: 34px; }

        .navbar .brand span { color: var(--teal); }

        .navbar a { color: white; text-decoration: none; }

        /* ─── Layout ─────────────────────── */
        .layout { display: flex; }

        /* ─── Sidebar ────────────────────── */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            min-height: calc(100vh - 64px);
            border-right: 1px solid var(--border);
            padding: 16px 12px;
            position: sticky; top: 64px;
        }

        .sidebar .section-title {
            padding: 20px 16px 8px;
            font-size: 11px; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 1.8px; font-weight: 700;
        }

        .sidebar a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; color: var(--text);
            text-decoration: none; font-size: 14px; font-weight: 500;
            border-radius: 10px; margin-bottom: 2px;
            transition: all 0.15s ease;
            border-left: 3px solid transparent;
        }

        .sidebar a:hover { background: var(--sidebar-hover); color: var(--navy); }

        .sidebar a.active {
            background: var(--sidebar-hover); color: var(--navy);
            font-weight: 600; border-left-color: var(--teal);
        }

        .sidebar a .icon { width: 18px; height: 18px; opacity: 0.45; flex-shrink: 0; }
        .sidebar a.active .icon, .sidebar a:hover .icon { opacity: 1; }

        /* ─── Main Content ───────────────── */
        .main-content { flex: 1; padding: 28px 32px; }

        .main-content .page-title {
            color: var(--navy); font-size: 26px; font-weight: 700;
            margin-bottom: 4px; letter-spacing: -0.4px;
            display: flex; align-items: center; gap: 10px;
        }

        .main-content .page-subtitle {
            color: var(--text-muted); font-size: 14px; margin-bottom: 24px;
        }

        /* ─── Cards ──────────────────────── */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card h2 {
            color: var(--navy); font-size: 20px; font-weight: 700;
            letter-spacing: -0.2px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }

        /* ─── Stats Badges ───────────────── */
        .stats-row {
            display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
        }

        .stat-badge {
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 13px;
            color: var(--text-muted);
            display: flex; align-items: center; gap: 8px;
        }

        .stat-badge strong {
            color: var(--navy); font-size: 16px; font-weight: 700;
        }

        .stat-badge .dot {
            width: 8px; height: 8px; border-radius: 50%;
        }

        .stat-badge .dot.blue { background: var(--blue); }
        .stat-badge .dot.green { background: var(--green); }
        .stat-badge .dot.orange { background: var(--orange); }

        /* ─── Filter Row ─────────────────── */
        .filter-row {
            display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
        }

        .filter-row select,
        .filter-row input {
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 13px; font-family: inherit;
            color: var(--text); background: white;
            transition: border-color 0.15s ease;
            min-width: 140px;
        }

        .filter-row select:focus,
        .filter-row input:focus {
            outline: none; border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(0,194,186,0.1);
        }

        .filter-row input { flex: 1; min-width: 200px; }

        /* ─── Buttons ────────────────────── */
        .btn {
            padding: 10px 20px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 13px; font-weight: 600;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.15s ease; font-family: inherit;
        }

        .btn:hover { transform: translateY(-1px); }

        .btn-primary { background: var(--navy); color: white; }
        .btn-primary:hover { background: var(--navy-light); box-shadow: 0 4px 12px rgba(10,31,63,0.25); }

        .btn-outline { background: white; color: var(--navy); border: 1.5px solid var(--border); }
        .btn-outline:hover { border-color: var(--navy); background: var(--sidebar-hover); }

        .btn-success { background: var(--green); color: white; }
        .btn-success:hover { box-shadow: 0 4px 12px rgba(5,150,105,0.3); }

        .btn-danger { background: var(--red); color: white; }
        .btn-danger:hover { box-shadow: 0 4px 12px rgba(220,38,38,0.3); }

        .btn-warning { background: var(--orange); color: white; }
        .btn-warning:hover { box-shadow: 0 4px 12px rgba(234,88,12,0.3); }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }

        /* ─── Progress Bar ───────────────── */
        .progress-container { margin: 16px 0; display: none; }

        .progress {
            height: 24px;
            background: #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--green), #34d399);
            border-radius: 12px;
            transition: width 0.5s ease;
            width: 0%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 11px; font-weight: 700;
            min-width: 45px;
        }

        .progress-text {
            text-align: center; font-size: 13px;
            color: var(--text-muted); margin-top: 6px;
        }

        /* ─── Table ──────────────────────── */
        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; min-width: 700px; }

        th, td { padding: 11px 14px; text-align: left; font-size: 13px; }

        th {
            background: #f9fafb; font-weight: 600;
            color: var(--text-muted); font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.8px;
            border-bottom: 2px solid var(--border);
        }

        td { border-bottom: 1px solid var(--border); color: var(--text); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafbfc; }

        td input[type="checkbox"] {
            width: 16px; height: 16px; cursor: pointer; accent-color: var(--teal);
        }

        /* ─── Pagination ─────────────────── */
        .pagination {
            margin-top: 20px;
            display: flex; gap: 8px; align-items: center;
            flex-wrap: wrap; font-size: 14px; color: var(--text-muted);
        }

        .pagination button {
            padding: 8px 14px;
            border: 1.5px solid var(--border);
            background: white; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all 0.15s ease; font-family: inherit;
        }

        .pagination button:hover { border-color: var(--navy); color: var(--navy); }
        .pagination button.active { background: var(--navy); color: white; border-color: var(--navy); }

        .pagination select {
            padding: 8px 12px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 13px; font-family: inherit;
        }

        /* ─── Empty State ────────────────── */
        .empty-state {
            text-align: center; padding: 40px 20px; color: var(--green);
        }

        .empty-state svg {
            width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.4;
        }

        /* ─── Responsive ─────────────────── */
        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar {
                width: 100%; min-height: auto;
                display: flex; flex-wrap: wrap;
                padding: 8px 4px; border-right: none;
                border-bottom: 1px solid var(--border);
                position: static; overflow-x: auto;
            }
            .sidebar .section-title { display: none; }
            .sidebar a {
                padding: 8px 12px; font-size: 12px;
                border-left: none; border-bottom: 2px solid transparent;
                border-radius: 0; white-space: nowrap;
            }
            .sidebar a:hover { border-bottom-color: var(--teal); border-left: none; }
            .sidebar a.active { border-left: none; border-bottom-color: var(--teal); }
            .main-content { padding: 16px 12px; }
            .card { padding: 20px; }
            .card h2 { font-size: 17px; }
            .filter-row { flex-direction: column; }
            .filter-row select, .filter-row input { width: 100%; min-width: auto; }
            .btn-row { flex-direction: column; }
            .btn-row .btn { justify-content: center; }
            .navbar { padding: 0 14px; }
            .navbar .brand { font-size: 15px; }
            .stats-row { flex-direction: column; gap: 8px; }
        }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'dashboard' %}">
            <div class="brand">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0A1F3F" stroke="#00C2BA" stroke-width="3"/>
                    <line x1="35" y1="30" x2="35" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
                    <line x1="65" y1="30" x2="65" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
                    <line x1="35" y1="50" x2="65" y2="50" stroke="#00C2BA" stroke-width="5" stroke-linecap="round"/>
                </svg>
                One<span>Card</span>
            </div>
        </a>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="section-title">Students</div>
            <a href="{% url 'view_students' %}">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                View Students
            </a>
            <a href="{% url 'import_students' %}" class="active">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Import Students
            </a>
        </div>

        <div class="main-content">
            <h1 class="page-title">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Import Students
            </h1>
            <p class="page-subtitle">Import students from the school database into OneCard</p>

            <div class="card">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
                    Import from School Database
                </h2>

                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-badge">
                        <span class="dot blue"></span>
                        Remaining: <strong id="totalCount">0</strong>
                    </div>
                    <div class="stat-badge">
                        <span class="dot green"></span>
                        Imported: <strong id="importedCount">0</strong>
                    </div>
                    <div class="stat-badge">
                        <span class="dot orange"></span>
                        Selected: <strong id="selectedCount">0</strong>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filter-row">
                    <select id="filterClass">
                        <option value="">All Classes</option>
                        <option>Senior 1</option><option>Senior 2</option><option>Senior 3</option>
                        <option>Senior 4</option><option>Senior 5</option><option>Senior 6</option>
                    </select>
                    <select id="filterStream">
                        <option value="">All Streams</option>
                        <option>A</option><option>B</option><option>C</option><option>D</option>
                        <option>E</option><option>F</option><option>G</option><option>H</option>
                    </select>
                    <input type="text" id="filterSearch" placeholder="Search name or admission number...">
                    <button class="btn btn-primary" onclick="loadStudents(1)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Filter
                    </button>
                </div>

                <!-- Progress Bar -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress"><div class="progress-bar" id="progressBar">0%</div></div>
                    <div class="progress-text" id="progressText">Starting import...</div>
                </div>

                <!-- Action Buttons -->
                <div class="btn-row">
                    <button class="btn btn-outline" onclick="selectAll()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9,11 11,13 15,9"/></svg>
                        Select All Visible
                    </button>
                    <button class="btn btn-outline" onclick="deselectAll()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        Deselect All
                    </button>
                    <button class="btn btn-success" id="importBtn" onclick="importSelected()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Import Selected
                    </button>
                    <button class="btn btn-warning" id="importAllBtn" onclick="importAll()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Import All Students
                    </button>
                </div>

                <!-- Table -->
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:40px;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleAll(this)"></th>
                                <th>Admission #</th>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Stream</th>
                                <th>Payment Code</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <tr><td colspan="6" class="empty-state">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        const PER_PAGE = 50;
        let currentPage = 1;
        let totalPages = 1;
        let allStudents = [];
        let selectedSet = new Set();
        let progressInterval = null;

        function loadStudents(page) {
            currentPage = page;
            const cls = document.getElementById('filterClass').value;
            const stream = document.getElementById('filterStream').value;
            const search = document.getElementById('filterSearch').value;
            
            document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted);">Loading...</td></tr>';
            
            const params = new URLSearchParams({cls, stream, search, page, per_page: PER_PAGE});
            fetch(`/api/students-list/?${params}`)
                .then(r => r.json())
                .then(data => {
                    allStudents = data.students;
                    totalPages = data.total_pages;
                    document.getElementById('totalCount').textContent = data.remaining_count;
                    document.getElementById('importedCount').textContent = data.imported_count;
                    selectedSet.clear();
                    document.getElementById('selectedCount').textContent = '0';
                    renderTable();
                    renderPagination();
                });
        }

        function renderTable() {
            const tbody = document.getElementById('studentTableBody');
            if (allStudents.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
                        <p style="font-weight:600;">All students have been imported!</p>
                    </div>
                </td></tr>`;
                return;
            }
            tbody.innerHTML = allStudents.map(s => `
                <tr>
                    <td><input type="checkbox" value="${s.admission_number}" ${selectedSet.has(s.admission_number) ? 'checked' : ''} onchange="toggleStudent(this)"></td>
                    <td>${s.admission_number}</td>
                    <td>${s.full_name}</td>
                    <td>${s.current_class}</td>
                    <td>${s.stream}</td>
                    <td style="font-family:monospace;font-size:12px;">${s.payment_code}</td>
                </tr>
            `).join('');
            document.getElementById('selectedCount').textContent = selectedSet.size;
        }

        function renderPagination() {
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; return; }
            let html = `<span>Page ${currentPage} of ${totalPages}</span>`;
            if (currentPage > 1) html += `<button onclick="loadStudents(${currentPage - 1})">Prev</button>`;
            if (currentPage < totalPages) html += `<button onclick="loadStudents(${currentPage + 1})">Next</button>`;
            html += `<span>Go to:</span> <select onchange="loadStudents(this.value)">`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<option value="${i}" ${i === currentPage ? 'selected' : ''}>${i}</option>`;
            }
            html += '</select>';
            pag.innerHTML = html;
        }

        function toggleStudent(cb) {
            if (cb.checked) selectedSet.add(cb.value);
            else selectedSet.delete(cb.value);
            document.getElementById('selectedCount').textContent = selectedSet.size;
        }

        function toggleAll(cb) {
            allStudents.forEach(s => {
                if (cb.checked) selectedSet.add(s.admission_number);
                else selectedSet.delete(s.admission_number);
            });
            renderTable();
        }

        function selectAll() { allStudents.forEach(s => selectedSet.add(s.admission_number)); renderTable(); }
        function deselectAll() { allStudents.forEach(s => selectedSet.delete(s.admission_number)); renderTable(); }

        function showProgress() { document.getElementById('progressContainer').style.display = 'block'; }
        function hideProgress() { document.getElementById('progressContainer').style.display = 'none'; }

        function startProgressPolling() {
            showProgress();
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                fetch('/api/import-progress/')
                    .then(r => r.json())
                    .then(data => {
                        const bar = document.getElementById('progressBar');
                        const text = document.getElementById('progressText');
                        const pct = data.percent || 0;
                        bar.style.width = pct + '%';
                        bar.textContent = pct > 5 ? pct + '%' : '';
                        text.textContent = data.message || 'Importing...';
                        
                        if (!data.running) {
                            clearInterval(progressInterval);
                            progressInterval = null;
                            if (pct >= 100) {
                                bar.style.background = 'linear-gradient(90deg, #059669, #34d399)';
                                text.textContent = data.message;
                                setTimeout(() => { hideProgress(); loadStudents(1); }, 2000);
                            }
                        }
                    });
            }, 500);
        }

        function importSelected() {
            if (selectedSet.size === 0) { alert('Select students first.'); return; }
            if (!confirm(`Import ${selectedSet.size} student(s)?`)) return;
            const btn = document.getElementById('importBtn');
            btn.disabled = true; btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;"></div> Importing...';
            startProgressPolling();
            fetch('/api/import-students/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify({students: Array.from(selectedSet)})
            }).then(r => r.json()).then(data => { if (data.success) selectedSet.clear(); })
            .finally(() => { btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Import Selected'; });
        }

        function importAll() {
            if (!confirm('This will import ALL remaining students. This may take several minutes. Continue?')) return;
            const btn = document.getElementById('importAllBtn');
            btn.disabled = true; btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;"></div> Importing All...';
            startProgressPolling();
            fetch('/api/import-students/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify({import_all: true})
            }).then(r => r.json()).then(data => { if (data.success) selectedSet.clear(); })
            .finally(() => { btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Import All Students'; });
        }

        function getCookie(name) {
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        loadStudents(1);
    </script>
