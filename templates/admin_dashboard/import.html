<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Students - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #1a237e; color: white; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .navbar .brand { font-size: 18px; font-weight: 600; }
        .navbar a { color: white; text-decoration: none; }
        .layout { display: flex; }
        .sidebar { width: 240px; background: white; min-height: calc(100vh - 60px); border-right: 1px solid #e0e0e0; padding-top: 10px; }
        .sidebar a { display: block; padding: 12px 24px; color: #333; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; }
        .sidebar a:hover { background: #f5f5ff; color: #1a237e; border-left-color: #1a237e; }
        .sidebar .section-title { padding: 20px 24px 8px; font-size: 11px; text-transform: uppercase; color: #999; letter-spacing: 1.5px; font-weight: 600; }
        .main-content { flex: 1; padding: 24px 32px; }
        .card { background: white; border-radius: 8px; padding: 24px; border: 1px solid #e8e8e8; margin-bottom: 20px; }
        .card h2 { color: #1a237e; margin-bottom: 12px; }
        .btn { padding: 10px 22px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-primary { background: #1a237e; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
        th { background: #f5f5f5; font-weight: 600; }
        .alert { padding: 12px 20px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
        .alert-info { background: #e3f2fd; color: #1565c0; border-left: 4px solid #2196f3; }
        .pagination { margin-top: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .pagination button { padding: 8px 16px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; }
        .pagination button.active { background: #1a237e; color: white; }
        .pagination select { padding: 8px; border-radius: 4px; }
        .stats { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
        .stats span { font-size: 14px; color: #666; }
        .stats strong { color: #1a237e; }
        .progress-container { margin: 12px 0; }
        .progress { height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #2e7d32, #4caf50); border-radius: 10px; transition: width 0.5s ease; width: 0%; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 600; min-width: 40px; }
        .progress-text { text-align: center; font-size: 13px; color: #666; margin-top: 4px; }
        .filter-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-row select, .filter-row input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; }
        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; min-height: auto; display: flex; flex-wrap: wrap; padding: 5px 0; border-right: none; border-bottom: 1px solid #e0e0e0; }
            .sidebar .section-title { display: none; }
            .sidebar a { padding: 8px 12px; font-size: 12px; border-left: none; border-bottom: 2px solid transparent; }
            .main-content { padding: 12px; }
            .card { padding: 16px; }
            table { font-size: 11px; }
            th, td { padding: 6px 8px; }
            .btn { padding: 8px 14px; font-size: 12px; }
            .filter-row { flex-direction: column; }
            .filter-row select, .filter-row input { width: 100%; }
        }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="navbar">
        <div class="brand"><a href="{% url 'dashboard' %}" style="color:white;">OneCard System</a></div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <div class="section-title">Students</div>
            <a href="{% url 'view_students' %}">View Students</a>
            <a href="{% url 'import_students' %}" style="background:#f5f5ff; color:#1a237e; border-left-color:#1a237e;">Import Students</a>
        </div>
        <div class="main-content">
            <div class="card">
                <h2>Import Students from School Database</h2>
                
                <div class="filter-row">
                    <select id="filterClass">
                        <option value="">All Classes</option>
                        <option>Senior 1</option><option>Senior 2</option><option>Senior 3</option>
                        <option>Senior 4</option><option>Senior 5</option><option>Senior 6</option>
                    </select>
                    <select id="filterStream">
                        <option value="">All Streams</option>
                        <option>A</option><option>B</option><option>C</option><option>D</option>
                        <option>E</option><option>F</option><option>G</option><option>H</option>
                    </select>
                    <input type="text" id="filterSearch" placeholder="Search name or admission#">
                    <button class="btn btn-primary" onclick="loadStudents(1)">Filter</button>
                </div>
                
                <div class="stats">
                    <span>Remaining: <strong id="totalCount">0</strong></span>
                    <span>Already Imported: <strong id="importedCount">0</strong></span>
                    <span>Selected: <strong id="selectedCount">0</strong></span>
                </div>
                
                <!-- Live Progress Bar -->
                <div class="progress-container" id="progressContainer" style="display:none;">
                    <div class="progress">
                        <div class="progress-bar" id="progressBar">0%</div>
                    </div>
                    <div class="progress-text" id="progressText">Starting import...</div>
                </div>
                
                <div style="margin-bottom:12px;">
                    <button class="btn btn-primary" onclick="selectAll()">Select All Visible</button>
                    <button class="btn btn-danger" onclick="deselectAll()">Deselect All</button>
                    <button class="btn btn-success" id="importBtn" onclick="importSelected()">Import Selected</button>
                    <button class="btn btn-primary" id="importAllBtn" onclick="importAll()" style="background:#e65100;">Import All Students</button>
                </div>
                
                <table>
                    <thead>
                        <tr><th><input type="checkbox" id="selectAllCheckbox" onchange="toggleAll(this)"></th>
                        <th>Admission #</th><th>Name</th><th>Class</th><th>Stream</th><th>Payment Code</th></tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <tr><td colspan="6" style="text-align:center; color:#999;">Loading...</td></tr>
                    </tbody>
                </table>
                
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        const PER_PAGE = 50;
        let currentPage = 1;
        let totalPages = 1;
        let allStudents = [];
        let selectedSet = new Set();
        let progressInterval = null;

        function loadStudents(page) {
            currentPage = page;
            const cls = document.getElementById('filterClass').value;
            const stream = document.getElementById('filterStream').value;
            const search = document.getElementById('filterSearch').value;
            
            document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading...</td></tr>';
            
            const params = new URLSearchParams({cls, stream, search, page, per_page: PER_PAGE});
            fetch(`/api/students-list/?${params}`)
                .then(r => r.json())
                .then(data => {
                    allStudents = data.students;
                    totalPages = data.total_pages;
                    document.getElementById('totalCount').textContent = data.remaining_count;
                    document.getElementById('importedCount').textContent = data.imported_count;
                    selectedSet.clear();
                    document.getElementById('selectedCount').textContent = '0';
                    renderTable();
                    renderPagination();
                });
        }

        function renderTable() {
            const tbody = document.getElementById('studentTableBody');
            if (allStudents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#2e7d32; padding:20px;">All students have been imported!</td></tr>';
                return;
            }
            tbody.innerHTML = allStudents.map(s => `
                <tr>
                    <td><input type="checkbox" value="${s.admission_number}" ${selectedSet.has(s.admission_number) ? 'checked' : ''} onchange="toggleStudent(this)"></td>
                    <td>${s.admission_number}</td>
                    <td>${s.full_name}</td>
                    <td>${s.current_class}</td>
                    <td>${s.stream}</td>
                    <td>${s.payment_code}</td>
                </tr>
            `).join('');
            document.getElementById('selectedCount').textContent = selectedSet.size;
        }

        function renderPagination() {
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; return; }
            let html = `<span>Page ${currentPage} of ${totalPages}</span>`;
            if (currentPage > 1) html += `<button onclick="loadStudents(${currentPage - 1})">Prev</button>`;
            if (currentPage < totalPages) html += `<button onclick="loadStudents(${currentPage + 1})">Next</button>`;
            html += ` <span>Go to:</span> <select onchange="loadStudents(this.value)">`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<option value="${i}" ${i === currentPage ? 'selected' : ''}>${i}</option>`;
            }
            html += '</select>';
            pag.innerHTML = html;
        }

        function toggleStudent(cb) {
            if (cb.checked) selectedSet.add(cb.value);
            else selectedSet.delete(cb.value);
            document.getElementById('selectedCount').textContent = selectedSet.size;
        }

        function toggleAll(cb) {
            allStudents.forEach(s => {
                if (cb.checked) selectedSet.add(s.admission_number);
                else selectedSet.delete(s.admission_number);
            });
            renderTable();
        }

        function selectAll() {
            allStudents.forEach(s => selectedSet.add(s.admission_number));
            renderTable();
        }

        function deselectAll() {
            allStudents.forEach(s => selectedSet.delete(s.admission_number));
            renderTable();
        }

        function showProgress() {
            document.getElementById('progressContainer').style.display = 'block';
        }

        function hideProgress() {
            document.getElementById('progressContainer').style.display = 'none';
        }

        function startProgressPolling() {
            showProgress();
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                fetch('/api/import-progress/')
                    .then(r => r.json())
                    .then(data => {
                        const bar = document.getElementById('progressBar');
                        const text = document.getElementById('progressText');
                        const pct = data.percent || 0;
                        bar.style.width = pct + '%';
                        bar.textContent = pct > 5 ? pct + '%' : '';
                        text.textContent = data.message || 'Importing...';
                        
                        if (!data.running) {
                            clearInterval(progressInterval);
                            progressInterval = null;
                            if (pct >= 100) {
                                bar.style.background = 'linear-gradient(90deg, #2e7d32, #4caf50)';
                                text.textContent = data.message;
                                setTimeout(() => {
                                    hideProgress();
                                    loadStudents(1);
                                }, 2000);
                            }
                        }
                    });
            }, 500);
        }

        function importSelected() {
            if (selectedSet.size === 0) { alert('Select students first.'); return; }
            if (!confirm(`Import ${selectedSet.size} student(s)?`)) return;
            
            const btn = document.getElementById('importBtn');
            btn.disabled = true;
            btn.textContent = 'Importing...';
            
            startProgressPolling();
            
            fetch('/api/import-students/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify({students: Array.from(selectedSet)})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    selectedSet.clear();
                }
            })
            .finally(() => { btn.disabled = false; btn.textContent = 'Import Selected'; });
        }

        function importAll() {
            if (!confirm('This will import ALL remaining students. This may take several minutes. Continue?')) return;
            
            const btn = document.getElementById('importAllBtn');
            btn.disabled = true;
            btn.textContent = 'Importing All...';
            
            startProgressPolling();
            
            fetch('/api/import-students/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify({import_all: true})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    selectedSet.clear();
                }
            })
            .finally(() => { btn.disabled = false; btn.textContent = 'Import All Students'; });
        }

        function getCookie(name) {
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        // Initial load
        loadStudents(1);
    </script>
</body>
</html>
