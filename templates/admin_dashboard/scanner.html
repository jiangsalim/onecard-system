<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - OneCard</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        .scanner-container { max-width: 640px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 24px 0 16px; }
        .header .logo { display: inline-flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 700; color: #fff; }
        .header .logo svg { width: 28px; height: 28px; }
        .controls { display: flex; gap: 10px; margin-bottom: 16px; }
        .controls select { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #16213e; color: #e0e0e0; font-size: 14px; cursor: pointer; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 16px; border: 2px solid #2a2a4a; display: none; }
        .result-card { background: #16213e; border-radius: 12px; padding: 24px; display: none; border: 1px solid #2a2a4a; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-card.show { display: block; }
        .result-header { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
        .result-icon svg { width: 44px; height: 44px; }
        .result-name { font-size: 20px; font-weight: 700; }
        .result-detail { font-size: 13px; color: #8899aa; margin-top: 2px; }
        .fees-box { background: #0f3460; border-radius: 8px; padding: 16px; margin: 14px 0; }
        .fees-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 14px; color: #b0c4de; }
        .fees-total { font-size: 20px; font-weight: 700; padding-top: 10px; border-top: 1px solid #1a4a7a; color: #fff; }
        .badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
        .badge-success { background: #1b5e20; color: #a5d6a7; }
        .badge-warning { background: #e65100; color: #ffcc80; }
        .badge-error { background: #b71c1c; color: #ef9a9a; }
        .badge-info { background: #0d47a1; color: #90caf9; }
        .attendance-confirm { text-align: center; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 14px; font-weight: 500; display: none; }
        .attendance-confirm.marked { background: #1b5e20; color: #a5d6a7; display: block; }
        .attendance-confirm.duplicate { background: #0d47a1; color: #90caf9; display: block; }
        .manual-entry { margin-top: 24px; text-align: center; }
        .manual-entry p { color: #8899aa; margin-bottom: 8px; font-size: 13px; }
        .manual-entry .input-row { display: flex; gap: 8px; }
        .manual-entry input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #333; background: #16213e; color: #fff; font-size: 14px; outline: none; }
        .manual-entry input:focus { border-color: #3f51b5; }
        .manual-entry button { padding: 12px 20px; border-radius: 8px; border: none; background: #3f51b5; color: white; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; }
        .status-text { text-align: center; font-size: 13px; color: #8899aa; margin-top: 12px; min-height: 20px; }
        .toggle-camera { text-align: center; margin: 10px 0; }
        .toggle-camera button { padding: 8px 16px; border-radius: 6px; border: 1px solid #3f51b5; background: transparent; color: #3f51b5; cursor: pointer; font-size: 13px; }
        .close-btn { background: #c62828; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .passout-form { margin-top: 12px; }
        .passout-form select, .passout-form input { width: 100%; padding: 10px; margin: 6px 0; border-radius: 6px; border: 1px solid #333; background: #1a1a2e; color: #fff; font-size: 14px; }
        .passout-form label { font-size: 13px; color: #8899aa; display: block; margin-top: 8px; }
        .passout-form .btn-confirm { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-exit { background: #e65100; color: white; }
        .btn-return { background: #2e7d32; color: white; }
        .duration-box { background: #0d47a1; border-radius: 8px; padding: 12px; text-align: center; margin: 10px 0; font-size: 16px; font-weight: 600; }
        .meal-success-box { background: #1b5e20; border-radius: 8px; padding: 12px; text-align: center; margin: 10px 0; font-size: 16px; font-weight: 600; color: #a5d6a7; }
        /* Mobile Responsive */
@media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { 
        width: 100%; min-height: auto; 
        display: flex; flex-wrap: wrap; gap: 0;
        padding: 5px 0; border-right: none; 
        border-bottom: 1px solid #e0e0e0;
    }
    .sidebar .section-title { display: none; }
    .sidebar a { 
        padding: 8px 12px; font-size: 12px; 
        border-left: none; border-bottom: 2px solid transparent;
    }
    .sidebar a:hover { border-bottom-color: #1a237e; border-left: none; }
    .main-content { margin-left: 0; padding: 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 16px 10px; }
    .stat-card .stat-value { font-size: 22px; }
    .stat-card .stat-label { font-size: 11px; }
    .grid-2 { grid-template-columns: 1fr; }
    .action-grid { grid-template-columns: 1fr; }
    .card { padding: 16px; }
    .card h2 { font-size: 16px; }
    table { font-size: 11px; }
    th, td { padding: 6px 8px; }
    .btn { padding: 8px 14px; font-size: 12px; }
    .navbar { padding: 0 10px; }
    .navbar .brand { font-size: 15px; }
    .navbar .user-info { gap: 8px; font-size: 11px; }
    .navbar .role-badge { padding: 2px 8px; font-size: 9px; }
    .quick-links { flex-direction: column; }
    .quick-links .btn { width: 100%; text-align: center; }
    .filter-row { flex-direction: column; }
    .filter-row select, .filter-row input { width: 100%; }
}
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="2" width="18" height="20" rx="2"/><rect x="7" y="6" width="10" height="8" rx="1"/><line x1="7" y1="17" x2="17" y2="17"/><line x1="7" y1="20" x2="13" y2="20"/></svg>
                OneCard Scanner
            </div>
        </div>
        <div class="controls">
            <select id="location"><option value="Main Gate">Main Gate</option><option value="Side Gate">Side Gate</option><option value="Dining Hall">Dining Hall</option><option value="Bursar Office">Bursar Office</option></select>
            <select id="mode" onchange="onModeChange()">
                <option value="attendance_balance">Attendance + Balance</option>
                <option value="balance_only">Balance Only</option>
                <option value="pass_out">Pass Out / Exit</option>
                <option value="meal_tracking">Meal Tracking</option>
            </select>
        </div>
        <div class="toggle-camera"><button onclick="toggleCamera()">Enable Camera Scanner</button></div>
        <div id="reader"></div>
        <div class="status-text" id="statusText">Enter a Student ID below and click Lookup</div>

        <div id="result" class="result-card">
            <div style="text-align:right; margin-bottom:8px;"><button class="close-btn" onclick="closeResult()">Close</button></div>
            <div class="result-header"><div class="result-icon" id="resultIcon"></div><div><div class="result-name" id="resultName"></div><div class="result-detail" id="resultDetail"></div></div></div>
            <div id="feesContainer">
                <div class="fees-box"><div class="fees-row"><span>Total Fees</span><span id="feesTotal"></span></div><div class="fees-row"><span>Amount Paid</span><span id="feesPaid"></span></div><div class="fees-row fees-total"><span>Balance</span><span id="feesBalance"></span></div></div>
                <div style="text-align:center;" id="feesStatus"></div>
            </div>
            <div id="passoutContainer" style="display:none;"><div class="passout-form" id="passoutForm"></div></div>
            <div id="returnContainer" style="display:none;"></div>
            <div id="mealContainer" style="display:none;"></div>
            <div id="attendanceConfirm" class="attendance-confirm"></div>
        </div>

        <div class="manual-entry"><p>Manual Entry</p><div class="input-row"><input type="text" id="manualId" placeholder="Enter Student ID (e.g. STU-001)"><button id="lookupBtn" onclick="manualLookup()">Lookup</button></div></div>
    </div>

    <template id="icon-success"><svg viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="8,12 11,15 16,9"/></svg></template>
    <template id="icon-warning"><svg viewBox="0 0 24 24" fill="none" stroke="#ff9800" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="7" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5" fill="#ff9800" stroke="none"/></svg></template>
    <template id="icon-error"><svg viewBox="0 0 24 24" fill="none" stroke="#f44336" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></template>
    <template id="icon-loading"><svg viewBox="0 0 24 24" fill="none" stroke="#90caf9" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/></circle></svg></template>
    <template id="icon-exit"><svg viewBox="0 0 24 24" fill="none" stroke="#ff9800" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></template>
    <template id="icon-return"><svg viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></template>

    <script>
        let cameraActive = false;
        let currentStudentData = null;
        const html5QrCode = new Html5Qrcode("reader");
        const statusText = document.getElementById('statusText');
        function setIcon(id) { const d = document.getElementById('resultIcon'); d.innerHTML = ''; d.appendChild(document.getElementById(id).content.cloneNode(true)); }
        
        function onModeChange() {
            const mode = document.getElementById('mode').value;
            if (mode === 'pass_out') statusText.textContent = 'Pass Out Mode â€” Scan to exit or return';
            else if (mode === 'meal_tracking') statusText.textContent = 'Meal Tracking Mode â€” Scan to serve meal';
            else statusText.textContent = cameraActive ? 'Position QR code in front of camera' : 'Enter a Student ID and click Lookup';
        }
        
        function toggleCamera() {
            if (cameraActive) { html5QrCode.stop().then(() => { cameraActive = false; document.getElementById('reader').style.display = 'none'; statusText.textContent = 'Camera stopped.'; }).catch(()=>{}); }
            else { document.getElementById('reader').style.display = 'block'; statusText.textContent = 'Starting camera...'; html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, onScanFailure).then(() => { cameraActive = true; onModeChange(); }).catch(err => { document.getElementById('reader').style.display = 'none'; statusText.textContent = 'Camera unavailable â€” use manual entry'; }); }
        }
        function onScanSuccess(decodedText) { 
            const now = Date.now(); if (now - lastScanTime < 3000) return; lastScanTime = now;
            html5QrCode.pause(); showLoading(); processScan(decodedText); 
        }
        function onScanFailure(err) {}
        let lastScanTime = 0;
        
        function showLoading() { 
            setIcon('icon-loading'); document.getElementById('resultName').textContent = 'Processing...'; document.getElementById('resultName').style.color = '#90caf9'; 
            document.getElementById('resultDetail').textContent = 'Fetching student data'; 
            document.getElementById('feesContainer').style.display = 'none'; 
            document.getElementById('passoutContainer').style.display = 'none'; 
            document.getElementById('returnContainer').style.display = 'none'; 
            document.getElementById('mealContainer').style.display = 'none'; 
            document.getElementById('attendanceConfirm').className = 'attendance-confirm'; 
            document.getElementById('result').classList.add('show'); 
        }

        function processScan(studentId) {
            const location = document.getElementById('location').value, mode = document.getElementById('mode').value;
            const csrfToken = getCookie('csrftoken');
            fetch('/api/scan/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken || '' }, body: JSON.stringify({ student_id: studentId, location: location, mode: mode }) })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    if (mode === 'pass_out' && data.movement) {
                        if (data.movement.action === 'exit') showPassOutForm(data);
                        else if (data.movement.action === 'return') showReturnConfirmation(data);
                    } else if (mode === 'meal_tracking') {
                        showMealResult(data);
                    } else {
                        showBalanceResult(data);
                    }
                } else {
                    if (mode === 'meal_tracking') showMealError(data);
                    else showError(data.error, data.error_code);
                }
            })
            .catch(() => showError('Cannot reach server.', 'NETWORK_ERROR'))
            .finally(() => { if (cameraActive) html5QrCode.resume().catch(()=>{}); });
        }

        function showBalanceResult(data) {
            const s = data.student, f = data.fees;
            document.getElementById('feesContainer').style.display = 'block';
            document.getElementById('passoutContainer').style.display = 'none';
            document.getElementById('returnContainer').style.display = 'none';
            document.getElementById('mealContainer').style.display = 'none';
            if (f.status === 'CLEARED') { setIcon('icon-success'); document.getElementById('resultName').style.color = '#4caf50'; }
            else if (f.status === 'OVERPAID') { setIcon('icon-warning'); document.getElementById('resultName').style.color = '#2196f3'; }
            else if (f.status === 'NOT PAID') { setIcon('icon-error'); document.getElementById('resultName').style.color = '#f44336'; }
            else { setIcon('icon-warning'); document.getElementById('resultName').style.color = '#ff9800'; }
            document.getElementById('resultName').textContent = s.name;
            document.getElementById('resultDetail').textContent = `${s.class} ${s.stream} | ${s.admission}`;
            document.getElementById('feesTotal').textContent = f.total.toLocaleString() + ' UGX';
            document.getElementById('feesPaid').textContent = f.paid.toLocaleString() + ' UGX';
            document.getElementById('feesBalance').textContent = f.balance.toLocaleString() + ' UGX';
            let badge = f.status === 'CLEARED' ? '<span class="badge badge-success">CLEARED</span>' : f.status === 'OVERPAID' ? '<span class="badge badge-info">OVERPAID</span>' : f.status === 'NOT PAID' ? '<span class="badge badge-error">NOT PAID</span>' : '<span class="badge badge-warning">NOT CLEARED</span>';
            document.getElementById('feesStatus').innerHTML = badge;
            const attEl = document.getElementById('attendanceConfirm');
            if (data.attendance.marked) { attEl.textContent = 'Attendance Recorded â€” ' + new Date().toLocaleTimeString(); attEl.className = 'attendance-confirm marked'; }
            else if (data.attendance.already_marked) { attEl.textContent = 'Already Marked Present Today'; attEl.className = 'attendance-confirm duplicate'; }
            else { attEl.className = 'attendance-confirm'; }
        }

        function showPassOutForm(data) {
            const s = data.student;
            document.getElementById('feesContainer').style.display = 'none';
            document.getElementById('returnContainer').style.display = 'none';
            document.getElementById('mealContainer').style.display = 'none';
            document.getElementById('passoutContainer').style.display = 'block';
            document.getElementById('attendanceConfirm').className = 'attendance-confirm';
            setIcon('icon-exit'); document.getElementById('resultName').textContent = s.name; document.getElementById('resultName').style.color = '#ff9800';
            document.getElementById('resultDetail').textContent = `${s.class} ${s.stream} | ${s.admission}`;
            currentStudentData = data;
            document.getElementById('passoutForm').innerHTML = `
                <label>Reason for leaving</label>
                <select id="passReason"><option value="sick">Sick</option><option value="home">Home</option><option value="emergency">Emergency</option><option value="other">Other</option></select>
                <label>Authorized by</label><input type="text" id="passAuthorizedBy" placeholder="Name of authorizing staff">
                <button class="btn-confirm btn-exit" onclick="confirmPassOut()">Confirm Exit</button>`;
        }

        function showReturnConfirmation(data) {
            const m = data.movement;
            document.getElementById('feesContainer').style.display = 'none'; document.getElementById('passoutContainer').style.display = 'none';
            document.getElementById('mealContainer').style.display = 'none';
            document.getElementById('returnContainer').style.display = 'block'; document.getElementById('attendanceConfirm').className = 'attendance-confirm';
            setIcon('icon-return'); document.getElementById('resultName').textContent = data.student.name; document.getElementById('resultName').style.color = '#4caf50';
            document.getElementById('resultDetail').textContent = 'Student has returned';
            document.getElementById('returnContainer').innerHTML = `
                <div class="duration-box">Time Out: ${m.time_out}<br>Time In: ${m.time_in}<br>Duration: ${m.duration}</div>
                <p style="text-align:center; color:#a5d6a7; margin-top:10px;">Return Logged Successfully</p>`;
        }

        function confirmPassOut() {
            const reason = document.getElementById('passReason').value;
            const authorizedBy = document.getElementById('passAuthorizedBy').value.trim();
            if (!authorizedBy) { alert('Please enter who authorized this exit.'); return; }
            fetch('/movement/api/pass-out/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') || '' }, body: JSON.stringify({ student_id: currentStudentData.student.id, reason: reason, authorized_by: authorizedBy, location: document.getElementById('location').value }) })
            .then(r => r.json()).then(data => {
                if (data.success) { document.getElementById('passoutForm').innerHTML = '<p style="text-align:center; color:#ffcc80; padding:20px;">Exit Logged â€” Student may leave</p>'; setTimeout(closeResult, 3000); }
                else { alert(data.error || 'Failed to log exit'); }
            }).catch(() => alert('Connection error'));
        }

        function showMealResult(data) {
            const s = data.student, m = data.meal;
            document.getElementById('feesContainer').style.display = 'none'; document.getElementById('passoutContainer').style.display = 'none';
            document.getElementById('returnContainer').style.display = 'none'; document.getElementById('attendanceConfirm').className = 'attendance-confirm';
            document.getElementById('mealContainer').style.display = 'block';
            setIcon('icon-success'); document.getElementById('resultName').textContent = s.name; document.getElementById('resultName').style.color = '#4caf50';
            document.getElementById('resultDetail').textContent = `${s.class} ${s.stream} | ${m.category.toUpperCase()}`;
            document.getElementById('mealContainer').innerHTML = `
                <div class="meal-success-box">âœ… ${m.type.toUpperCase()} SERVED<br><small>Time: ${m.time}</small><br><small>Category: ${m.category.toUpperCase()}</small></div>`;
        }

        function showMealError(data) {
            document.getElementById('feesContainer').style.display = 'none'; document.getElementById('passoutContainer').style.display = 'none';
            document.getElementById('returnContainer').style.display = 'none'; document.getElementById('attendanceConfirm').className = 'attendance-confirm';
            document.getElementById('mealContainer').style.display = 'block';
            if (data.error_code === 'ALREADY_SERVED') { setIcon('icon-warning'); document.getElementById('resultName').style.color = '#ff9800'; }
            else { setIcon('icon-error'); document.getElementById('resultName').style.color = '#f44336'; }
            document.getElementById('resultName').textContent = data.error_code === 'ALREADY_SERVED' ? 'Already Served' : 'Access Denied';
            document.getElementById('resultDetail').textContent = data.error;
            document.getElementById('mealContainer').innerHTML = `<p style="text-align:center; color:#ffcc80; padding:20px;">${data.error}</p>`;
        }

        function showError(message, errorCode) {
            setIcon('icon-error'); document.getElementById('resultName').textContent = errorCode === 'CARD_REPLACED' ? 'Card Replaced' : 'Error'; document.getElementById('resultName').style.color = '#f44336'; document.getElementById('resultDetail').textContent = message;
            document.getElementById('feesContainer').style.display = 'none'; document.getElementById('passoutContainer').style.display = 'none'; document.getElementById('returnContainer').style.display = 'none'; document.getElementById('mealContainer').style.display = 'none'; document.getElementById('attendanceConfirm').className = 'attendance-confirm';
            document.getElementById('result').classList.add('show');
        }
        function closeResult() { document.getElementById('result').classList.remove('show'); onModeChange(); }
        function manualLookup() { const id = document.getElementById('manualId').value.trim(); if (!id) { alert('Enter a Student ID'); return; } showLoading(); processScan(id); document.getElementById('manualId').value = ''; document.getElementById('manualId').focus(); }
        function getCookie(name) { let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)'); return v ? v[2] : null; }
        document.getElementById('manualId').addEventListener('keypress', function(e) { if (e.key === 'Enter') manualLookup(); });
    </script>
</body>
</html>
