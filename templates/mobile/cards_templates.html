<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <title>Card Designs - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding-bottom: 70px; }
        .header { background: #1a237e; color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
        .header .title { font-size: 16px; font-weight: 600; }
        .header a { color: #ffcc80; text-decoration: none; font-size: 14px; font-weight: 600; }
        .template-list { padding: 12px 16px; }
        .template-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .template-card .info .name { font-weight: 600; font-size: 15px; }
        .template-card .info .level { font-size: 12px; color: #888; }
        .template-card .colors { display: flex; gap: 6px; margin-top: 6px; }
        .color-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #ddd; }
        .btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; }
        .btn-edit { background: #1a237e; color: white; }
        .btn-del { background: #c62828; color: white; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #e0e0e0; }
        .bottom-nav a { flex: 1; text-align: center; padding: 10px 0; color: #888; text-decoration: none; font-size: 11px; }
        .bottom-nav a.active { color: #1a237e; }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="header">
        <div class="title">Card Designs</div>
        <a href="{% url 'template_create' %}">+ New</a>
    </div>
    <div class="template-list">
        {% for t in templates %}
        <div class="template-card">
            <div class="info">
                <div class="name">{{ t.name }}</div>
                <div class="level">{{ t.get_class_level_display }} | {{ t.color_name }}</div>
                <div class="colors">
                    <div class="color-dot" style="background:{{ t.background_color }};"></div>
                    <div class="color-dot" style="background:{{ t.border_color }};"></div>
                    <div class="color-dot" style="background:{{ t.badge_color }};"></div>
                </div>
            </div>
            <div style="display:flex; gap:6px;">
                <a href="{% url 'template_edit' t.id %}" class="btn btn-edit">Edit</a>
                <a href="{% url 'template_delete' t.id %}" class="btn btn-del" onclick="return confirm('Delete?')">Del</a>
            </div>
        </div>
        {% empty %}
        <p style="text-align:center;color:#999;padding:40px;">No templates yet.</p>
        {% endfor %}
    </div>
    <div class="bottom-nav">
        <a href="{% url 'template_list' %}" class="active">Designs</a>
        <a href="{% url 'assign_templates' %}">Assign</a>
        <a href="{% url 'print_cards' %}">Print</a>
        <a href="{% url 'printed_cards' %}">Printed</a>
    </div>
</body>
</html>
