<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Delete User - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; max-width: 380px; width: 100%; }
        .card h2 { color: #c62828; font-size: 18px; margin-bottom: 10px; }
        .card p { color: #666; font-size: 14px; margin-bottom: 16px; }
        .user-info { background: #fff3e0; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: left; font-size: 13px; line-height: 1.6; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-danger { background: #c62828; color: white; }
        .btn-cancel { background: #e0e0e0; color: #333; margin-left: 8px; }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="card">
        <h2>Delete User</h2>
        <p>This cannot be undone.</p>
        <div class="user-info">
            <strong>{{ target_user.username }}</strong><br>
            {{ target_user.get_full_name }}<br>
            {{ target_user.get_role_display }}
        </div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'user_management' %}" class="btn btn-cancel">Cancel</a>
        </form>
    </div>
