<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Bursar Dashboard - OneCard | Jinja SS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
            background: #F8F9FA; 
            padding-bottom: 70px; 
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            background: linear-gradient(135deg, #0A1F3F, #132D52); 
            color: white; 
            padding: 20px 20px; 
            box-shadow: 0 4px 20px rgba(10, 31, 63, 0.3);
        }
        
        .header .top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .header .name { 
            font-size: 16px; 
            font-weight: 600; 
            letter-spacing: 0.3px;
        }
        
        .header .role-info { 
            font-size: 11px; 
            color: #00C2BA; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            margin-top: 2px;
        }
        
        .header .logout { 
            color: #ff8a80; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 138, 128, 0.3);
            transition: all 0.3s ease;
        }
        
        .header .logout:hover {
            background: rgba(255, 138, 128, 0.1);
        }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 20px 16px; 
        }
        
        .stat-card { 
            background: white; 
            border-radius: 16px; 
            padding: 18px; 
            text-align: center; 
            box-shadow: 0 2px 12px rgba(10, 31, 63, 0.06);
            border: 1px solid #f0f0f0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(10, 31, 63, 0.1);
        }
        
        .stat-card .value { 
            font-size: 28px; 
            font-weight: 700; 
            color: #0A1F3F; 
            font-family: 'Playfair Display', serif;
        }
        
        .stat-card .label { 
            font-size: 11px; 
            color: #9CA3AF; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .section { 
            margin: 0 16px 20px; 
        }
        
        .section-title { 
            font-size: 14px; 
            font-weight: 700; 
            color: #0A1F3F; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        .lookup-box { 
            display: flex; 
            gap: 10px; 
        }
        
        .lookup-box input { 
            flex: 1; 
            padding: 16px 18px; 
            border: 1px solid #e0e0e0; 
            border-radius: 14px; 
            font-size: 15px; 
            font-family: 'Inter', sans-serif;
            background: white;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .lookup-box input:focus {
            border-color: #00C2BA;
            box-shadow: 0 0 0 3px rgba(0, 194, 186, 0.1);
        }
        
        .lookup-box button { 
            padding: 16px 24px; 
            background: linear-gradient(135deg, #00C2BA, #00A8A0); 
            color: #0A1F3F; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 14px; 
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .lookup-box button:hover {
            box-shadow: 0 8px 25px rgba(0, 194, 186, 0.3);
            transform: translateY(-1px);
        }
        
        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 16px; 
            box-shadow: 0 2px 12px rgba(10, 31, 63, 0.06);
            border: 1px solid #f0f0f0;
        }
        
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 14px 0; 
            border-bottom: 1px solid #f0f0f0; 
            font-size: 14px; 
        }
        
        .list-item:last-child { 
            border-bottom: none; 
        }
        
        .list-item span:first-child {
            color: #0A1F3F;
            font-weight: 500;
        }
        
        .badge { 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 600; 
            letter-spacing: 0.5px;
        }
        
        .badge-success { 
            background: rgba(0, 194, 186, 0.1); 
            color: #00A8A0; 
        }
        
        .badge-warning { 
            background: #fff3e0; 
            color: #e65100; 
        }
        
        .badge-error { 
            background: #ffebee; 
            color: #c62828; 
        }
        
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            display: flex; 
            border-top: 1px solid #f0f0f0;
            box-shadow: 0 -4px 20px rgba(10, 31, 63, 0.08);
            z-index: 100;
        }
        
        .bottom-nav a { 
            flex: 1; 
            text-align: center; 
            padding: 10px 0 8px; 
            color: #9CA3AF; 
            text-decoration: none; 
            font-size: 10px; 
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .bottom-nav a.active { 
            color: #00C2BA; 
        }
        
        .bottom-nav a svg { 
            display: block; 
            margin: 0 auto 4px; 
        }
        
        .result-card { 
            background: white; 
            border-radius: 16px; 
            padding: 16px; 
            margin-top: 12px; 
            display: none; 
            box-shadow: 0 2px 12px rgba(10, 31, 63, 0.06);
            border: 1px solid #f0f0f0;
        }
        
        .result-card.show { 
            display: block; 
        }
        
        .result-success {
            background: rgba(0, 194, 186, 0.05);
            border: 1px solid rgba(0, 194, 186, 0.2);
            border-radius: 14px;
            padding: 16px;
        }
        
        .result-error {
            background: rgba(198, 40, 40, 0.05);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 14px;
            padding: 16px;
            color: #c62828;
        }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="header">
        <div class="top">
            <div>
                <div class="name">{{ user.get_full_name|default:user.username }}</div>
                <div class="role-info">Bursar</div>
            </div>
            <a href="{% url 'logout' %}" class="logout">Logout</a>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Student Balance Lookup</div>
        <div class="lookup-box">
            <input type="text" id="lookupInput" placeholder="Enter Student ID (e.g. STU-001)">
            <button onclick="quickLookup()">Check</button>
        </div>
        <div class="result-card" id="lookupResult"></div>
    </div>

    <div class="section">
        <div class="section-title">Fee Summary</div>
        <div class="card">
            <div class="list-item">
                <span>Cleared</span>
                <span class="badge badge-success" id="clearedCount">...</span>
            </div>
            <div class="list-item">
                <span>Not Cleared</span>
                <span class="badge badge-warning" id="notClearedCount">...</span>
            </div>
            <div class="list-item">
                <span>Not Paid</span>
                <span class="badge badge-error" id="notPaidCount">...</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="{% url 'bursar_dashboard' %}" class="active">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Home
        </a>
        <a href="{% url 'fee_report' %}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Fees
        </a>
        <a href="{% url 'inbox' %}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Messages
        </a>
        <a href="{% url 'reprint_card' %}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Reprint
        </a>
        <a href="{% url 'scanner' %}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            Scan
        </a>
    </div>

    <script>
        function quickLookup() {
            const q = document.getElementById('lookupInput').value.trim();
            if (!q) return;
            fetch('/api/scan/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                body: JSON.stringify({student_id: q, location: 'Bursar Office', mode: 'balance_only'})
            })
            .then(r => r.json())
            .then(data => {
                const r = document.getElementById('lookupResult');
                r.classList.add('show');
                if (data.success) {
                    const s = data.student, f = data.fees;
                    r.innerHTML = `<div class="result-success">
                        <strong style="font-size:18px; color:#0A1F3F; font-family:'Playfair Display',serif;">${s.name}</strong><br>
                        <span style="color:#9CA3AF; font-size:13px;">${s.class} ${s.stream} | ${s.admission}</span>
                        <div style="margin-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <div><small style="color:#9CA3AF;">Total</small><br><strong style="color:#0A1F3F;">${f.total.toLocaleString()} UGX</strong></div>
                            <div><small style="color:#9CA3AF;">Paid</small><br><strong style="color:#00C2BA;">${f.paid.toLocaleString()} UGX</strong></div>
                            <div><small style="color:#9CA3AF;">Balance</small><br><strong style="color:${f.status==='CLEARED'?'#00C2BA':'#c62828'}">${f.balance.toLocaleString()} UGX</strong></div>
                            <div><small style="color:#9CA3AF;">Status</small><br><span class="badge ${f.status==='CLEARED'?'badge-success':'badge-error'}">${f.status}</span></div>
                        </div>
                    </div>`;
                } else {
                    r.innerHTML = `<div class="result-error">${data.error}</div>`;
                }
            });
        }
        function getCookie(name) { let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)'); return v ? v[2] : null; }
    </script>

</body>
</html>
