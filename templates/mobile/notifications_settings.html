<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Notification Settings - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding-bottom: 20px; }
        .header { background: #1a237e; color: white; padding: 14px 16px; }
        .header .title { font-size: 16px; font-weight: 600; }
        .card-white { background: white; border-radius: 12px; padding: 20px; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; }
        .checkbox-group input { width: 20px; height: 20px; }
        .btn { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="header"><div class="title">Alert Settings</div></div>
    <div class="card-white">
        <form method="post">
            {% csrf_token %}
            <div class="form-group"><label>Fee Balance Alert (UGX)</label><input type="number" name="fee_balance_threshold" value="{{ settings.fee_balance_threshold }}"></div>
            <div class="form-group"><label>Consecutive Days Absent</label><input type="number" name="attendance_consecutive_days" value="{{ settings.attendance_consecutive_days }}"></div>
            <div class="form-group"><label>Student Outside Alert (Hours)</label><input type="number" name="movement_hours_outside" value="{{ settings.movement_hours_outside }}"></div>
            <div class="form-group">
                <label>Late Arrival Cutoff Time</label>
                <input type="time" name="late_cutoff_time" value="{{ settings.late_cutoff_time|time:'H:i'|default:'08:00' }}">
                <small style="color:#888;">Students scanned after this time are marked Late</small>
            </div>
            <div class="checkbox-group"><input type="checkbox" name="show_in_dashboard" {% if settings.show_in_dashboard %}checked{% endif %}><span>Show in dashboard</span></div>
            <button type="submit" class="btn">Save Settings</button>
        </form>
    </div>
</body>
</html>
