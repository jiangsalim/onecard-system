<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <title>User Form - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding-bottom: 20px; }
        .header { background: #1a237e; color: white; padding: 14px 16px; }
        .header .title { font-size: 16px; font-weight: 600; }
        .card-white { background: white; border-radius: 12px; padding: 20px; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .extra-fields { display: none; background: #f5f5f5; padding: 12px; border-radius: 8px; margin-top: 10px; }
        .extra-fields.show { display: block; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #1a237e; color: white; }
        .btn-cancel { background: #e0e0e0; color: #333; margin-top: 8px; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header"><div class="title">{% if edit_mode %}Edit{% else %}Add{% endif %} User</div></div>
    <div class="card-white">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group"><label>First Name</label><input type="text" name="first_name" value="{{ target_user.first_name|default:'' }}" required></div>
                <div class="form-group"><label>Last Name</label><input type="text" name="last_name" value="{{ target_user.last_name|default:'' }}" required></div>
            </div>
            <div class="form-group"><label>Username</label><input type="text" name="username" value="{{ target_user.username|default:'' }}" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ target_user.email|default:'' }}"></div>
            <div class="form-group"><label>Password {% if edit_mode %}(leave blank to keep){% endif %}</label><input type="password" name="password" {% if not edit_mode %}required{% endif %}></div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" id="roleSelect" onchange="toggleFields()">
                    <option value="super_admin" {% if target_user.role == 'super_admin' %}selected{% endif %}>Super Admin</option>
                    <option value="admin" {% if target_user.role == 'admin' %}selected{% endif %}>Admin</option>
                    <option value="bursar" {% if target_user.role == 'bursar' %}selected{% endif %}>Bursar</option>
                    <option value="gate_staff" {% if target_user.role == 'gate_staff' %}selected{% endif %}>Gate Staff</option>
                    <option value="class_teacher" {% if target_user.role == 'class_teacher' %}selected{% endif %}>Class Teacher</option>
                </select>
            </div>
            <div class="extra-fields" id="gateFields"><div class="form-group"><label>Location</label><select name="assigned_location"><option value="Main Gate">Main Gate</option><option value="Side Gate">Side Gate</option><option value="Dining Hall">Dining Hall</option></select></div></div>
            <div class="extra-fields" id="teacherFields"><div class="form-row"><div class="form-group"><label>Class</label><select name="assigned_class"><option value="">--</option><option value="Senior 1">S.1</option><option value="Senior 2">S.2</option><option value="Senior 3">S.3</option><option value="Senior 4">S.4</option><option value="Senior 5">S.5</option><option value="Senior 6">S.6</option></select></div><div class="form-group"><label>Stream</label><select name="assigned_stream"><option value="">--</option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option><option>G</option><option>H</option></select></div></div></div>
            <button type="submit" class="btn btn-primary">{% if edit_mode %}Save{% else %}Create{% endif %}</button>
            <a href="{% url 'user_management' %}" class="btn btn-cancel">Cancel</a>
        </form>
    </div>
    <script>
        function toggleFields() {
            const role = document.getElementById('roleSelect').value;
            document.getElementById('gateFields').classList.toggle('show', role === 'gate_staff');
            document.getElementById('teacherFields').classList.toggle('show', role === 'class_teacher');
        }
        toggleFields();
    </script>
</body>
</html>
