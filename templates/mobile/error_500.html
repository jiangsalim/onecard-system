            justify-content: center;

            align-items: center;

            padding: 14px 32px;

            color: #0A1F3F; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 14px;
            display: inline-block;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            box-shadow: 0 8px 25px rgba(0, 194, 186, 0.3);
            transform: translateY(-2px);
        }
        
        .footer-text {
            margin-top: 32px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
