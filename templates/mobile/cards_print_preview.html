<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Print Preview - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e0e0e0; padding: 10px; }
        .card-preview { width: 300px; background: white; border: 2px solid #1a237e; border-radius: 8px; padding: 14px; margin: 8px auto; }
        .card-preview .header { text-align: center; font-weight: bold; font-size: 11px; margin-bottom: 6px; }
        .card-preview .qr { text-align: center; margin: 8px 0; }
        .card-preview .qr img { width: 90px; height: 90px; }
        .card-preview .info { font-size: 11px; line-height: 1.5; }
        .btn-print { position: fixed; bottom: 20px; left: 20px; right: 20px; padding: 16px; background: #1a237e; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <button class="btn-print" onclick="window.print()">Print All Cards</button>
    {% for student in students %}
    <div class="card-preview">
        <div class="header">ONECARD SYSTEM</div>
        <div style="text-align:center;font-size:10px;color:#888;">Student ID Card</div>
        <div class="qr">{% if student.qr_code %}<img src="{{ student.qr_code.url }}" alt="QR">{% endif %}</div>
        <div class="info">
            <strong>ID:</strong> {{ student.id }}<br>
            <strong>Admission:</strong> {{ student.admission_number }}<br>
            <strong>Payment Code:</strong> {{ student.payment_code }}<br>
            <strong>Status:</strong> {{ student.get_status_display }}
        </div>
    </div>
    {% endfor %}
</body>
</html>
