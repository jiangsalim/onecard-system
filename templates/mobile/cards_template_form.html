<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Template Form - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding-bottom: 70px; }
        .header { background: #1a237e; color: white; padding: 14px 16px; }
        .header .title { font-size: 16px; font-weight: 600; }
        .form-card { background: white; border-radius: 12px; padding: 20px; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; color: #333; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #1a237e; color: white; }
        .btn-cancel { background: #e0e0e0; color: #333; margin-top: 8px; }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="header"><div class="title">{% if template %}Edit{% else %}Create{% endif %} Template</div></div>
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group"><label>Template Name</label><input type="text" name="name" value="{{ template.name|default:'' }}" required></div>
            <div class="form-row">
                <div class="form-group"><label>Level</label><select name="class_level"><option value="O" {% if template.class_level == 'O' %}selected{% endif %}>O'LEVEL</option><option value="A" {% if template.class_level == 'A' %}selected{% endif %}>A'LEVEL</option></select></div>
                <div class="form-group"><label>Color Name</label><input type="text" name="color_name" value="{{ template.color_name|default:'' }}" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Background</label><input type="color" name="background_color" value="{{ template.background_color|default:'#FFFFFF' }}"></div>
                <div class="form-group"><label>Border</label><input type="color" name="border_color" value="{{ template.border_color|default:'#000000' }}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Badge Text</label><input type="text" name="badge_text" value="{{ template.badge_text|default:"O'LEVEL" }}"></div>
                <div class="form-group"><label>Badge Color</label><input type="color" name="badge_color" value="{{ template.badge_color|default:'#000000' }}"></div>
            </div>
            <button type="submit" class="btn btn-primary">Save Template</button>
            <a href="{% url 'template_list' %}" class="btn btn-cancel" style="display:block;text-align:center;text-decoration:none;">Cancel</a>
        </form>
    </div>
