<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Notifications - OneCard | Jinja SS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
            background: #F8F9FA; 
            padding-bottom: 30px;
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            background: linear-gradient(135deg, #0A1F3F, #132D52); 
            color: white; 
            padding: 18px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 20px rgba(10, 31, 63, 0.3);
        }
        
        .header .title { 
            font-size: 17px; 
            font-weight: 700; 
            letter-spacing: 0.3px;
            font-family: 'Playfair Display', serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header .unread-count {
            background: rgba(0, 194, 186, 0.2);
            color: #00C2BA;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
        }
        
        .header a { 
            color: #00C2BA; 
            text-decoration: none; 
            font-size: 12px; 
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 194, 186, 0.3);
            transition: all 0.3s ease;
        }
        
        .header a:hover {
            background: rgba(0, 194, 186, 0.1);
        }
        
        .notif-list { 
            padding: 16px; 
        }
        
        .notif-card { 
            background: white; 
            border-radius: 14px; 
            padding: 16px; 
            margin-bottom: 8px; 
            box-shadow: 0 2px 10px rgba(10, 31, 63, 0.04);
            border-left: 4px solid #0A1F3F; 
            border-top: 1px solid #f0f0f0;
            border-right: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
        }
        
        .notif-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(10, 31, 63, 0.08);
        }
        
        .notif-card.read { 
            border-left-color: #e0e0e0; 
            opacity: 0.65; 
        }
        
        .notif-card .title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .notif-card .title { 
            font-weight: 600; 
            font-size: 14px; 
            color: #0A1F3F;
        }
        
        .notif-card .msg { 
            font-size: 12px; 
            color: #9CA3AF; 
            margin-top: 4px; 
            line-height: 1.5;
        }
        
        .notif-card .time { 
            font-size: 11px; 
            color: #9CA3AF; 
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notif-card .time a {
            color: #00C2BA;
            font-weight: 600;
            text-decoration: none;
        }
        
        .notif-card .time a:hover {
            text-decoration: underline;
        }
        
        .badge { 
            padding: 3px 10px; 
            border-radius: 20px; 
            font-size: 10px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .badge-high { 
            background: rgba(198, 40, 40, 0.1); 
            color: #c62828; 
        }
        
        .badge-medium { 
            background: rgba(230, 81, 0, 0.1); 
            color: #e65100; 
        }
        
        .badge-low { 
            background: rgba(0, 194, 186, 0.1); 
            color: #00A8A0; 
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
            font-size: 14px;
        }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="header">
        <div class="title">
            Notifications
            {% if unread_count %}
            <span class="unread-count">{{ unread_count }} unread</span>
            {% endif %}
        </div>
        <a href="{% url 'mark_all_read' %}">Mark All Read</a>
    </div>
    
    <div class="notif-list">
        {% for n in notifications %}
        <div class="notif-card {% if n.is_read %}read{% endif %}">
            <div class="title-row">
                <div class="title">{{ n.title }}</div>
                <span class="badge badge-{{ n.priority }}">{{ n.priority }}</span>
            </div>
            <div class="msg">{{ n.message }}</div>
            <div class="time">
                {{ n.created_at|timesince }} ago
                {% if not n.is_read %}
                · <a href="{% url 'mark_as_read' n.id %}">Mark read</a>
                {% endif %}
            </div>
        </div>
        {% empty %}
        <div class="empty-state">No notifications yet.</div>
        {% endfor %}
    </div>

</body>
</html>
