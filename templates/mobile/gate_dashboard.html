<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Gate Dashboard - OneCard | Jinja SS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
            background: #F8F9FA; 
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            background: linear-gradient(135deg, #0A1F3F, #132D52); 
            color: white; 
            padding: 18px 20px; 
            box-shadow: 0 4px 20px rgba(10, 31, 63, 0.3);
        }
        
        .header .top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .header .name { 
            font-size: 16px; 
            font-weight: 600; 
            letter-spacing: 0.3px;
        }
        
        .header .location { 
            font-size: 11px; 
            color: #00C2BA; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            margin-top: 2px;
        }
        
        .header .logout { 
            color: #ff8a80; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 138, 128, 0.3);
            transition: all 0.3s ease;
        }
        
        .header .logout:hover {
            background: rgba(255, 138, 128, 0.1);
        }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 20px 16px; 
        }
        
        .stat-card { 
            background: white; 
            border-radius: 16px; 
            padding: 18px; 
            text-align: center; 
            box-shadow: 0 2px 12px rgba(10, 31, 63, 0.06);
            border: 1px solid #f0f0f0;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .stat-card .value { 
            font-size: 28px; 
            font-weight: 700; 
            font-family: 'Playfair Display', serif;
        }
        
        .stat-card .label { 
            font-size: 11px; 
            color: #9CA3AF; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .quick-actions { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 0 16px 20px; 
        }
        
        .action-btn {
            background: white; 
            border-radius: 16px; 
            padding: 24px 16px; 
            text-align: center;
            text-decoration: none; 
            font-weight: 700; 
            font-size: 14px;
            box-shadow: 0 2px 12px rgba(10, 31, 63, 0.06);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column; 
            align-items: center; 
            gap: 10px;
            transition: all 0.3s ease;
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .action-btn svg { 
            width: 36px; 
            height: 36px; 
        }
        
        .action-btn.scan { 
            background: linear-gradient(135deg, #0A1F3F, #132D52); 
        }
        
        .action-btn.exit { 
            background: linear-gradient(135deg, #e65100, #ff6d00); 
        }
        
        .action-btn.meal { 
            background: linear-gradient(135deg, #00C2BA, #00A8A0); 
            color: #0A1F3F;
        }
        
        .action-btn.movement { 
            background: linear-gradient(135deg, #132D52, #1A3A6B); 
        }
        
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            display: flex; 
            border-top: 1px solid #f0f0f0;
            box-shadow: 0 -4px 20px rgba(10, 31, 63, 0.08);
            z-index: 100;
        }
        
        .bottom-nav a { 
            flex: 1; 
            text-align: center; 
            padding: 10px 0 8px; 
            color: #9CA3AF; 
            text-decoration: none; 
            font-size: 10px; 
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .bottom-nav a.active { 
            color: #00C2BA; 
        }
        
        .bottom-nav a svg { 
            display: block; 
            margin: 0 auto 4px; 
        }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="header">
        <div class="top">
            <div>
                <div class="name">{{ user.get_full_name|default:user.username }}</div>
                <div class="location">{{ user.assigned_location|default:"Main Gate" }} · Gate Staff</div>
            </div>
            <a href="{% url 'logout' %}" class="logout">Logout</a>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" style="color:#00C2BA;">{{ stats.present }}</div>
            <div class="label">Checked In</div>
        </div>
        <div class="stat-card">
            <div class="value" style="color:#e65100;">{{ stats.outside }}</div>
            <div class="label">Outside</div>
        </div>
        <div class="stat-card">
            <div class="value" style="color:#c62828;">{{ stats.absent }}</div>
            <div class="label">Absent</div>
        </div>
        <div class="stat-card">
            <div class="value" style="font-size:16px; color:#0A1F3F;">{{ stats.last_scan }}</div>
            <div class="label">Last Scan</div>
        </div>
    </div>

    <div class="quick-actions">
        <a href="{% url 'scanner' %}" class="action-btn scan">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            Scan Card
        </a>
        <a href="{% url 'scanner' %}" class="action-btn exit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Pass Out
        </a>
        <a href="{% url 'scanner' %}" class="action-btn meal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            Meal Track
        </a>
        <a href="{% url 'movement_dashboard' %}" class="action-btn movement">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 6.9 8 11.7z"/></svg>
            Movement
        </a>
    </div>

    <div class="bottom-nav">
        <a href="#" class="active">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Home
        </a>
        <a href="{% url 'scanner' %}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            Scanner
        </a>
        <a href="{% url 'attendance_report' %}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            Report
        </a>
        <a href="{% url 'meal_report' %}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
            Meals
        </a>
    </div>

</body>
</html>
