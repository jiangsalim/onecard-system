<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>New Message - OneCard | Jinja SS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
            background: #F8F9FA; 
            padding-bottom: 20px;
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            background: linear-gradient(135deg, #0A1F3F, #132D52); 
            color: white; 
            padding: 18px 20px; 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            box-shadow: 0 4px 20px rgba(10, 31, 63, 0.3);
        }
        
        .header .back { 
            color: #00C2BA; 
            text-decoration: none; 
            font-size: 20px; 
            font-weight: 700;
            transition: color 0.3s;
        }
        
        .header .back:hover { color: #00E5D4; }
        
        .header .title { 
            font-size: 17px; 
            font-weight: 700; 
            letter-spacing: 0.3px;
            font-family: 'Playfair Display', serif;
        }
        
        .search-box { 
            padding: 14px 16px; 
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .search-box .search-wrapper {
            position: relative;
        }
        
        .search-box .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }
        
        .search-box input { 
            width: 100%; 
            padding: 14px 14px 14px 44px; 
            border: 1px solid #e0e0e0; 
            border-radius: 14px; 
            font-size: 14px; 
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            border-color: #00C2BA;
            box-shadow: 0 0 0 3px rgba(0, 194, 186, 0.1);
        }
        
        .user-list { 
            padding: 12px 16px; 
        }
        
        .user-item { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            padding: 16px; 
            background: white; 
            border-radius: 14px; 
            margin-bottom: 8px; 
            border: 1px solid #f0f0f0;
            width: 100%; 
            text-align: left; 
            font-family: 'Inter', sans-serif; 
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .user-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(10, 31, 63, 0.08);
            border-color: rgba(0, 194, 186, 0.2);
        }
        
        .user-item .avatar { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            background: rgba(0, 194, 186, 0.1); 
            color: #00C2BA; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            font-size: 17px; 
            flex-shrink: 0;
            border: 2px solid rgba(0, 194, 186, 0.2);
        }
        
        .user-item .name { 
            font-weight: 600; 
            font-size: 14px; 
            color: #0A1F3F;
        }
        
        .user-item .role-badge { 
            font-size: 10px; 
            color: #9CA3AF; 
            background: #F8F9FA; 
            padding: 3px 10px; 
            border-radius: 12px; 
            font-weight: 500;
            margin-top: 3px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .user-list .section-letter {
            font-size: 12px;
            color: #9CA3AF;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 4px 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'inbox' %}" class="back">←</a>
        <div class="title">New Message</div>
    </div>

    <div class="search-box">
        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="search" id="searchInput" placeholder="Search staff by name or role..." oninput="filterUsers()">
        </div>
    </div>

    <div class="user-list" id="userList">
        {% for u in users %}
        <form method="post" style="display:contents;">
            {% csrf_token %}
            <input type="hidden" name="user_id" value="{{ u.id }}">
            <button type="submit" class="user-item">
                <div class="avatar">{{ u.get_full_name|default:u.username|slice:":1"|upper }}</div>
                <div>
                    <div class="name">{{ u.get_full_name|default:u.username }}</div>
                    <span class="role-badge">{{ u.get_role_display|default:u.role }}</span>
                </div>
            </button>
        </form>
        {% endfor %}
    </div>

    <script>
        function filterUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }
    </script>

</body>
</html>
