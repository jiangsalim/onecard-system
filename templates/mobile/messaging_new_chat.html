<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>New Message - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #1a237e; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
        .header .back { color: white; text-decoration: none; font-size: 20px; }
        .header .title { font-size: 16px; font-weight: 600; }
        .search-box { padding: 12px 16px; }
        .search-box input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
        .user-list { padding: 0 12px; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: white; border-radius: 10px; margin-bottom: 4px; border: none; width: 100%; text-align: left; font-family: inherit; cursor: pointer; }
        .user-item .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1a237e; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
        .user-item .name { font-weight: 600; font-size: 14px; }
        .user-item .role-badge { font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'inbox' %}" class="back">ã</a>
        <div class="title">New Message</div>
    </div>

    <div class="search-box">
        <input type="search" id="searchInput" placeholder="Search staff..." oninput="filterUsers()">
    </div>

    <div class="user-list" id="userList">
        {% for u in users %}
        <form method="post" style="display:contents;">
            {% csrf_token %}
            <input type="hidden" name="user_id" value="{{ u.id }}">
            <button type="submit" class="user-item">
                <div class="avatar">{{ u.get_full_name|default:u.username|slice:":1"|upper }}</div>
                <div>
                    <div class="name">{{ u.get_full_name|default:u.username }}</div>
                    <span class="role-badge">{{ u.get_role_display|default:u.role }}</span>
                </div>
            </button>
        </form>
        {% endfor %}
    </div>

    <script>
        function filterUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }
    </script>
