<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Scanner - OneCard | Jinja SS</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #0A1F3F, #132D52);
            color: #e0e0e0; 
            padding: 16px; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 20px; 
        }
        
        .header h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 22px; 
            color: white;
            font-weight: 700;
        }
        
        .header .subtitle {
            font-size: 11px;
            color: #00C2BA;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        .controls { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 14px; 
        }
        
        .controls select { 
            flex: 1; 
            padding: 14px; 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.08);
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            font-size: 14px; 
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .controls select:focus {
            border-color: #00C2BA;
            box-shadow: 0 0 0 3px rgba(0, 194, 186, 0.15);
        }
        
        .controls select option {
            background: #0A1F3F;
            color: white;
        }
        
        #reader { 
            width: 100%; 
            border-radius: 16px; 
            overflow: hidden; 
            margin-bottom: 14px; 
            display: none;
            border: 2px solid rgba(0, 194, 186, 0.2);
        }
        
        .result-card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px; 
            padding: 20px; 
            display: none; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            margin-bottom: 14px; 
        }
        
        .result-card.show { 
            display: block; 
        }
        
        .result-header { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            margin-bottom: 16px; 
        }
        
        .result-photo { 
            width: 56px; 
            height: 70px; 
            border-radius: 10px; 
            object-fit: cover; 
            border: 2px solid rgba(0, 194, 186, 0.3);
            flex-shrink: 0; 
        }
        
        .result-photo-placeholder { 
            width: 56px; 
            height: 70px; 
            border-radius: 10px; 
            background: rgba(0, 194, 186, 0.15); 
            color: #00C2BA; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            font-weight: 700; 
            flex-shrink: 0; 
            border: 2px solid rgba(0, 194, 186, 0.3); 
        }
        
        .result-icon svg { 
            width: 40px; 
            height: 40px; 
        }
        
        .result-name { 
            font-family: 'Playfair Display', serif;
            font-size: 20px; 
            font-weight: 700; 
            color: white;
        }
        
        .result-detail { 
            font-size: 12px; 
            color: rgba(255, 255, 255, 0.6); 
            margin-top: 2px;
        }
        
        .fees-box { 
            background: rgba(0, 0, 0, 0.2); 
            border-radius: 12px; 
            padding: 16px; 
            margin: 12px 0; 
        }
        
        .fees-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0; 
            font-size: 14px; 
            color: rgba(255, 255, 255, 0.8);
        }
        
        .fees-total { 
            font-size: 20px; 
            font-weight: 700; 
            padding-top: 10px; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            color: #00C2BA;
            font-family: 'Playfair Display', serif;
        }
        
        .badge { 
            display: inline-block; 
            padding: 5px 14px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .badge-success { 
            background: rgba(0, 194, 186, 0.2); 
            color: #80cbc4; 
        }
        
        .badge-warning { 
            background: rgba(230, 81, 0, 0.2); 
            color: #ffcc80; 
        }
        
        .badge-error { 
            background: rgba(198, 40, 40, 0.2); 
            color: #ef9a9a; 
        }
        
        .manual-entry { 
            margin-top: 18px; 
        }
        
        .manual-entry .input-row { 
            display: flex; 
            gap: 8px; 
        }
        
        .manual-entry input { 
            flex: 1; 
            padding: 16px; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            background: rgba(255, 255, 255, 0.08); 
            color: white; 
            font-size: 16px; 
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .manual-entry input:focus {
            border-color: #00C2BA;
            box-shadow: 0 0 0 3px rgba(0, 194, 186, 0.15);
        }
        
        .manual-entry input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .manual-entry button { 
            padding: 16px 24px; 
            border-radius: 14px; 
            background: linear-gradient(135deg, #00C2BA, #00A8A0); 
            color: #0A1F3F; 
            border: none; 
            font-weight: 700; 
            font-size: 14px; 
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .manual-entry button:hover {
            box-shadow: 0 4px 15px rgba(0, 194, 186, 0.3);
        }
        
        .status-text { 
            text-align: center; 
            font-size: 12px; 
            color: rgba(255, 255, 255, 0.5); 
            margin: 12px 0; 
        }
        
        .close-btn { 
            background: rgba(198, 40, 40, 0.2); 
            color: #ff8a80; 
            border: 1px solid rgba(198, 40, 40, 0.3);
            padding: 8px 18px; 
            border-radius: 10px; 
            font-size: 13px; 
            cursor: pointer; 
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }
        
        .toggle-camera { 
            text-align: center; 
            margin: 12px 0; 
        }
        
        .toggle-camera button { 
            padding: 14px 28px; 
            border-radius: 14px; 
            border: 1px solid rgba(0, 194, 186, 0.3); 
            background: rgba(0, 194, 186, 0.1); 
            color: #00C2BA; 
            font-size: 14px; 
            font-weight: 600;
            cursor: pointer; 
            width: 100%; 
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        
        .toggle-camera button:hover {
            background: rgba(0, 194, 186, 0.2);
        }
        
        #attendanceConfirm {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
    <div class="header">
        <h1>OneCard Scanner</h1>
        <div class="subtitle">Jinja Senior Secondary School</div>
    </div>
    
    <div class="controls">
        <select id="location">
            <option value="Main Gate">Main Gate</option>
            <option value="Dining Hall">Dining Hall</option>
            <option value="Bursar Office">Bursar Office</option>
        </select>
        <select id="mode" onchange="onModeChange()">
            <option value="attendance_balance">Attendance</option>
            <option value="balance_only">Balance</option>
            <option value="pass_out">Pass Out</option>
            <option value="meal_tracking">Meal</option>
        </select>
    </div>
    
    <div class="toggle-camera"><button onclick="toggleCamera()">Open Camera</button></div>
    <div id="reader"></div>
    <div class="status-text" id="statusText">Enter Student ID below</div>

    <div id="result" class="result-card">
        <div style="text-align:right; margin-bottom:10px;"><button class="close-btn" onclick="closeResult()">Close</button></div>
        <div class="result-header">
            <img id="resultPhoto" class="result-photo" src="" alt="Photo" style="display:none;">
            <div id="resultPhotoPlaceholder" class="result-photo-placeholder" style="display:none;"></div>
            <div class="result-icon" id="resultIcon"></div>
            <div>
                <div class="result-name" id="resultName"></div>
                <div class="result-detail" id="resultDetail"></div>
            </div>
        </div>
        <div id="feesContainer">
            <div class="fees-box">
                <div class="fees-row"><span>Total</span><span id="feesTotal"></span></div>
                <div class="fees-row"><span>Paid</span><span id="feesPaid"></span></div>
                <div class="fees-row fees-total"><span>Balance</span><span id="feesBalance"></span></div>
            </div>
            <div style="text-align:center;" id="feesStatus"></div>
        </div>
        <div id="passoutContainer" style="display:none;"></div>
        <div id="returnContainer" style="display:none;"></div>
        <div id="mealContainer" style="display:none;"></div>
        <div id="attendanceConfirm"></div>
    </div>

    <div class="manual-entry">
        <div class="input-row">
            <input type="text" id="manualId" placeholder="Student ID (e.g. STU-001)">
            <button onclick="manualLookup()">Lookup</button>
        </div>
    </div>

    <template id="icon-success"><svg viewBox="0 0 24 24" fill="none" stroke="#00C2BA" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="8,12 11,15 16,9"/></svg></template>
    <template id="icon-warning"><svg viewBox="0 0 24 24" fill="none" stroke="#ff9800" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="7" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5" fill="#ff9800" stroke="none"/></svg></template>
    <template id="icon-error"><svg viewBox="0 0 24 24" fill="none" stroke="#f44336" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></template>

    <script>
let cameraActive = false;
let currentStudentData = null;
let lastScanTime = 0;
const html5QrCode = new Html5Qrcode("reader");

function setIcon(id) { const d = document.getElementById('resultIcon'); d.innerHTML = ''; d.appendChild(document.getElementById(id).content.cloneNode(true)); }

function setPhoto(photoUrl, name) {
    const img = document.getElementById('resultPhoto');
    const placeholder = document.getElementById('resultPhotoPlaceholder');
    if (photoUrl) {
        img.src = photoUrl;
        img.style.display = 'block';
        placeholder.style.display = 'none';
    } else if (name) {
        img.style.display = 'none';
        placeholder.textContent = name.charAt(0).toUpperCase();
        placeholder.style.display = 'flex';
    } else {
        img.style.display = 'none';
        placeholder.style.display = 'none';
    }
}

function getCSRFToken() {
    let token = getCookie('csrftoken');
    if (token) return token;
    const input = document.querySelector('input[name="csrfmiddlewaretoken"]');
    if (input) return input.value;
    return '';
}

function onModeChange() { document.getElementById('statusText').textContent = 'Enter Student ID below'; }
function toggleCamera() {
    if (cameraActive) { html5QrCode.stop().then(() => { cameraActive = false; document.getElementById('reader').style.display = 'none'; }).catch(()=>{}); }
    else { document.getElementById('reader').style.display = 'block'; html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},onScanSuccess,onScanFailure).then(()=>{cameraActive=true;}).catch(()=>{document.getElementById('reader').style.display='none';alert('Camera unavailable');}); }
}
function onScanSuccess(decodedText) { 
    const now = Date.now();
    if (now - lastScanTime < 3000) return;
    lastScanTime = now;
    html5QrCode.pause(); 
    showLoading(); 
    processScan(decodedText); 
}
function onScanFailure(err) {}

function showLoading() { 
    setIcon('icon-warning'); 
    document.getElementById('resultName').textContent='Processing...'; 
    document.getElementById('resultDetail').textContent=''; 
    document.getElementById('feesContainer').style.display='none'; 
    document.getElementById('passoutContainer').style.display='none'; 
    document.getElementById('returnContainer').style.display='none'; 
    document.getElementById('mealContainer').style.display='none'; 
    setPhoto('', ''); 
    document.getElementById('result').classList.add('show'); 
}

function processScan(studentId) {
    const mode = document.getElementById('mode').value, location = document.getElementById('location').value;
    const csrfToken = getCSRFToken();
    fetch('/api/scan/',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':csrfToken},
        body:JSON.stringify({student_id:studentId,location:location,mode:mode})
    })
    .then(r=>r.json()).then(data=>{
        if(data.success) {
            if (mode === 'pass_out' && data.movement) {
                if (data.movement.action === 'exit') showPassOutForm(data);
                else if (data.movement.action === 'return') showReturnConfirmation(data);
            } else if (mode === 'meal_tracking') {
                if (data.meal) showMealResult(data);
                else showMealError(data);
            } else {
                showBalanceResult(data);
            }
        } else {
            if (mode === 'meal_tracking') showMealError(data);
            else showError(data.error, data.error_code);
        }
    }).catch(()=>{ showError('Cannot reach server.', 'NETWORK_ERROR'); })
    .finally(()=>{ if (cameraActive) html5QrCode.resume().catch(()=>{}); });
}

function showBalanceResult(data) {
    const s = data.student, f = data.fees;
    document.getElementById('feesContainer').style.display = 'block';
    document.getElementById('passoutContainer').style.display = 'none';
    document.getElementById('returnContainer').style.display = 'none';
    document.getElementById('mealContainer').style.display = 'none';
    
    if (f.status === 'CLEARED') { setIcon('icon-success'); document.getElementById('resultName').style.color = '#4caf50'; }
    else if (f.status === 'OVERPAID') { setIcon('icon-warning'); document.getElementById('resultName').style.color = '#2196f3'; }
    else if (f.status === 'NOT PAID') { setIcon('icon-error'); document.getElementById('resultName').style.color = '#f44336'; }
    else { setIcon('icon-warning'); document.getElementById('resultName').style.color = '#ff9800'; }
    
    document.getElementById('resultName').textContent = s.name;
    document.getElementById('resultDetail').textContent = `${s.class} ${s.stream} | ${s.admission}`;
    setPhoto(s.photo || '', s.name);
    document.getElementById('feesTotal').textContent = f.total.toLocaleString() + ' UGX';
    document.getElementById('feesPaid').textContent = f.paid.toLocaleString() + ' UGX';
    document.getElementById('feesBalance').textContent = f.balance.toLocaleString() + ' UGX';
    document.getElementById('feesStatus').innerHTML = f.status === 'CLEARED' ? '<span class="badge badge-success">CLEARED</span>' : f.status === 'OVERPAID' ? '<span class="badge badge-info">OVERPAID</span>' : f.status === 'NOT PAID' ? '<span class="badge badge-error">NOT PAID</span>' : '<span class="badge badge-warning">NOT CLEARED</span>';
    
    if (data.attendance) {
        const attEl = document.getElementById('attendanceConfirm');
        if (data.attendance.marked) {
            attEl.textContent = 'Attendance Recorded — ' + new Date().toLocaleTimeString();
            attEl.style.display = 'block';
            attEl.style.background = '#1b5e20';
            attEl.style.color = '#a5d6a7';
        } else if (data.attendance.already_marked) {
            attEl.textContent = 'Already Marked Present Today';
            attEl.style.display = 'block';
            attEl.style.background = '#0d47a1';
            attEl.style.color = '#90caf9';
        }
    }
    document.getElementById('result').classList.add('show');
}

function showPassOutForm(data) {
    const s = data.student;
    document.getElementById('feesContainer').style.display = 'none';
    document.getElementById('returnContainer').style.display = 'none';
    document.getElementById('mealContainer').style.display = 'none';
    document.getElementById('passoutContainer').style.display = 'block';
    setIcon('icon-exit');
    document.getElementById('resultName').textContent = s.name;
    document.getElementById('resultName').style.color = '#ff9800';
    document.getElementById('resultDetail').textContent = `${s.class} ${s.stream} | ${s.admission}`;
    setPhoto(s.photo || '', s.name);
    currentStudentData = data;
    document.getElementById('passoutContainer').innerHTML = `
        <div class="passout-form">
            <label style="color:#8899aa; font-size:13px; display:block; margin-top:8px;">Reason for leaving</label>
            <select id="passReason" style="width:100%; padding:10px; margin:6px 0; border-radius:6px; border:1px solid #333; background:#1a1a2e; color:#fff; font-size:14px;">
                <option value="sick">Sick</option><option value="home">Home</option><option value="emergency">Emergency</option><option value="other">Other</option>
            </select>
            <label style="color:#8899aa; font-size:13px; display:block; margin-top:8px;">Authorized by</label>
            <input type="text" id="passAuthorizedBy" placeholder="Name of authorizing staff" style="width:100%; padding:10px; margin:6px 0; border-radius:6px; border:1px solid #333; background:#1a1a2e; color:#fff; font-size:14px;">
            <button onclick="confirmPassOut()" style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:none; font-size:15px; font-weight:600; background:#e65100; color:white;">Confirm Exit</button>
        </div>`;
    document.getElementById('result').classList.add('show');
}

function showReturnConfirmation(data) {
    const m = data.movement;
    const s = data.student;
    document.getElementById('feesContainer').style.display = 'none';
    document.getElementById('passoutContainer').style.display = 'none';
    document.getElementById('mealContainer').style.display = 'none';
    document.getElementById('returnContainer').style.display = 'block';
    setIcon('icon-return');
    document.getElementById('resultName').textContent = s.name;
    document.getElementById('resultName').style.color = '#4caf50';
    document.getElementById('resultDetail').textContent = 'Student has returned';
    setPhoto(s.photo || '', s.name);
    document.getElementById('returnContainer').innerHTML = `
        <div style="background:#0d47a1; border-radius:8px; padding:12px; text-align:center; margin:10px 0; font-size:14px; font-weight:600; color:#90caf9;">
            Time Out: ${m.time_out}<br>Time In: ${m.time_in}<br>Duration: ${m.duration}
        </div>
        <p style="text-align:center; color:#a5d6a7; margin-top:10px;">Return Logged Successfully</p>`;
    document.getElementById('result').classList.add('show');
    setTimeout(function(){ document.getElementById('result').classList.remove('show'); }, 4000);
}

function confirmPassOut() {
    const reason = document.getElementById('passReason').value;
    const authorizedBy = document.getElementById('passAuthorizedBy').value.trim();
    if (!authorizedBy) { alert('Please enter who authorized this exit.'); return; }
    const csrfToken = getCSRFToken();
    fetch('/movement/api/pass-out/', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken }, 
        body: JSON.stringify({ student_id: currentStudentData.student.id, reason: reason, authorized_by: authorizedBy, location: document.getElementById('location').value }) 
    })
    .then(r => r.json()).then(data => {
        if (data.success) { 
            document.getElementById('passoutContainer').innerHTML = '<p style="text-align:center; color:#a5d6a7; padding:20px;">Exit Logged — Student may leave</p>'; 
            setTimeout(function(){ document.getElementById('result').classList.remove('show'); }, 3000); 
        }
        else { alert(data.error || 'Failed to log exit'); }
    }).catch(() => alert('Connection error'));
}

function showMealResult(data) {
    const s = data.student, m = data.meal;
    document.getElementById('feesContainer').style.display = 'none';
    document.getElementById('passoutContainer').style.display = 'none';
    document.getElementById('returnContainer').style.display = 'none';
    document.getElementById('mealContainer').style.display = 'block';
    setIcon('icon-success');
    document.getElementById('resultName').textContent = s.name;
    document.getElementById('resultName').style.color = '#4caf50';
    document.getElementById('resultDetail').textContent = `${s.class} ${s.stream} | ${m.category.toUpperCase()}`;
    setPhoto(s.photo || '', s.name);
    document.getElementById('mealContainer').innerHTML = `
        <div style="background:#1b5e20; border-radius:8px; padding:12px; text-align:center; margin:10px 0; font-size:16px; font-weight:600; color:#a5d6a7;">
            ${m.type.toUpperCase()} SERVED<br><small>Time: ${m.time}</small><br><small>Category: ${m.category.toUpperCase()}</small>
        </div>`;
    document.getElementById('result').classList.add('show');
}

function showMealError(data) {
    document.getElementById('feesContainer').style.display = 'none';
    document.getElementById('passoutContainer').style.display = 'none';
    document.getElementById('returnContainer').style.display = 'none';
    document.getElementById('mealContainer').style.display = 'block';
    setPhoto('', '');
    if (data.error_code === 'ALREADY_SERVED') {
        setIcon('icon-warning');
        document.getElementById('resultName').style.color = '#ff9800';
        document.getElementById('resultName').textContent = 'Already Served';
    } else if (data.error_code === 'BALANCE_TOO_HIGH') {
        setIcon('icon-error');
        document.getElementById('resultName').style.color = '#f44336';
        document.getElementById('resultName').textContent = 'Meal Denied — Balance Too High';
    } else {
        setIcon('icon-error');
        document.getElementById('resultName').style.color = '#f44336';
        document.getElementById('resultName').textContent = 'Access Denied';
    }
    document.getElementById('resultDetail').textContent = data.error;
    document.getElementById('mealContainer').innerHTML = `<p style="text-align:center; color:#ffcc80; padding:20px;">${data.error}</p>`;
    document.getElementById('result').classList.add('show');
}

function showError(message, errorCode) {
    setIcon('icon-error');
    document.getElementById('resultName').textContent = errorCode === 'CARD_REPLACED' ? 'Card Replaced' : 'Error';
    document.getElementById('resultName').style.color = '#f44336';
    document.getElementById('resultDetail').textContent = message;
    document.getElementById('feesContainer').style.display = 'none';
    document.getElementById('passoutContainer').style.display = 'none';
    document.getElementById('returnContainer').style.display = 'none';
    document.getElementById('mealContainer').style.display = 'none';
    setPhoto('', '');
    document.getElementById('result').classList.add('show');
}

function closeResult() { document.getElementById('result').classList.remove('show'); onModeChange(); }
function manualLookup() { const id=document.getElementById('manualId').value.trim(); if(!id) { alert('Enter a Student ID'); return; } showLoading(); processScan(id); document.getElementById('manualId').value=''; document.getElementById('manualId').focus(); }
function getCookie(name) { let v=document.cookie.match('(^|;) ?'+name+'=([^;]*)(;|$)'); return v?v[2]:null; }
document.getElementById('manualId').addEventListener('keypress',function(e){if(e.key==='Enter')manualLookup();});
</script>
