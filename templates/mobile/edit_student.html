<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/lj8ucjmr/image/upload/v1784063633/onecard-jinja-sss/jinja-sss-badge.jpg">
    <title>Edit Student - OneCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding-bottom: 20px; }
        .header { background: #1a237e; color: white; padding: 14px 16px; }
        .header .title { font-size: 16px; font-weight: 600; }
        .card-white { background: white; border-radius: 12px; padding: 20px; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .info-row strong { color: #1a237e; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #1a237e; color: white; }
        .btn-cancel { background: #e0e0e0; color: #333; margin-top: 8px; display: block; text-align: center; text-decoration: none; }
    </style>
    <script>document.cookie="screen_width="+window.innerWidth+";path=/";</script>
</head>
<body>
    <div class="header"><div class="title">Edit {{ student.id }}</div></div>
    <div class="card-white">
        <div style="margin-bottom:16px;">
            <div class="info-row"><strong>Admission:</strong><span>{{ student.admission_number }}</span></div>
            <div class="info-row"><strong>Payment:</strong><span>{{ student.payment_code }}</span></div>
            <div class="info-row"><strong>Version:</strong><span>v{{ student.card_version }}</span></div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group"><label>Category</label><select name="category"><option value="day" {% if student.category == 'day' %}selected{% endif %}>Day Scholar</option><option value="hostel" {% if student.category == 'hostel' %}selected{% endif %}>Hostel Student</option></select></div>
            <div class="form-group"><label>Status</label><select name="status"><option value="active" {% if student.status == 'active' %}selected{% endif %}>Active</option><option value="inactive" {% if student.status == 'inactive' %}selected{% endif %}>Inactive</option></select></div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'view_students' %}" class="btn btn-cancel">Cancel</a>
        </form>
    </div>
